# This is a STATIC reference dataset describing what SHOULD exist after
# a KOF installation. It does NOT prove that runtime data is flowing.
# Use live validation tests to verify actual observability pipeline health.
---
total_trace_pipelines: 4
trace_receivers:
- nop
- otlp
trace_exporters:
- nop
- otlphttp/traces
pipelines:
- collector: kof-collectors-cluster-stats
  collector_mode: deployment
  pipeline: traces
  receivers:
  - nop
  processors:
  - k8sattributes
  exporters:
  - nop
- collector: kof-collectors-controller-k0s-daemon
  collector_mode: daemonset
  pipeline: traces
  receivers:
  - nop
  processors: []
  exporters:
  - nop
- collector: kof-collectors-daemon
  collector_mode: daemonset
  pipeline: traces
  receivers:
  - otlp
  processors:
  - k8sattributes
  - resourcedetection
  - batch
  exporters:
  - otlphttp/traces
- collector: kof-collectors-ta-daemon
  collector_mode: daemonset
  pipeline: traces
  receivers:
  - otlp
  processors:
  - k8sattributes
  exporters:
  - otlphttp/traces
expected_sources:
- type: otlp
  description: Application traces via OTLP receiver
- type: auto_instrumentation
  description: Auto-instrumented traces via Instrumentation CR
expected_destinations:
- type: victoria_traces
  description: VictoriaTraces cluster for trace storage
