{{- if .Values.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: external-dns-config
  namespace: {{ .Release.Namespace }}
data:
  AUTODNS_CONTEXT: {{ .Values.autodns.context | quote }}
  AUTODNS_VIRTUAL_NAMESERVER: {{ .Values.autodns.virtualNameserver | quote }}
  DEFAULT_TTL: {{ .Values.autodns.defaultTTL | quote }}
  SERVER_HOST: "0.0.0.0"
  LOG_LEVEL: {{ .Values.autodns.logLevel | quote }}
{{- end }}
