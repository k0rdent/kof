{{- if and .Values.serviceAccount.create .Values.baseline.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kof-file-watcher.fullname" . }}-baseline
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kof-file-watcher.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["file-watcher-baseline"]
    verbs: ["get", "update"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
{{- end }}
