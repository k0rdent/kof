- name: cluster:namespace:pod_memory:active:kube_pod_container_resource_requests
  group: k8s.rules.container_resource
  expr: kube_pod_container_resource_requests{resource="memory",job="kube-state-metrics"} * on (tenant,namespace, pod, cluster)
    group_left() max by (tenant,namespace, pod, cluster) ( (kube_pod_status_phase{phase=~"Pending|Running"} == 1) )
  metrics:
  - kube_pod_container_resource_requests
  - kube_pod_status_phase
  - tenant
  resource: kof-mothership-k8s.rules.container-resource
  namespace: kof
  source_chart: kof-mothership
- name: namespace_memory:kube_pod_container_resource_requests:sum
