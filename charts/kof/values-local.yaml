# Example values for local KOF deployment
# This configuration is suitable for development and testing on a local kind cluster

global:
  helmRepo:
    name: kof-repo
    namespace: kcm-system
    kofManaged:
      enabled: true
      url: oci://ghcr.io/k0rdent/kof/charts
      type: oci
      insecure: false

tls:
  selfSigned: true
  insecureSkipVerify: true

autoUpgrade: true

kof-operators:
  values:
    grafana-operator:
      enabled: true

# Install mothership components (management cluster)
kof-mothership:
  values:
    global:
      registry: ""
    kcm:
      kof:
        mcs:
          kof-aws-dns-secrets:
            matchLabels:
              k0rdent.mirantis.com/kof-aws-dns-secrets: "true"
            secrets:
              - external-dns-aws-credentials
        operator:
          image:
            registry: docker.io/library
            repository: kof-operator-controller
        acl:
          enabled: true
          developmentMode: true
          extraArgs:
            issuer: https://dex.example.com:8443
            admin-email: admin@example.com
          image:
            registry: docker.io/library
            repository: kof-acl-server
          ui:
            gateway:
              enabled: true
    victoriametrics:
      vmcluster:
        spec:
          retentionPeriod: "7d"
          replicationFactor: 1
          vmstorage:
            replicaCount: 1
            storage:
              volumeClaimTemplate:
                spec:
                  resources:
                    requests:
                      storage: 10Gi
          vmselect:
            replicaCount: 1
          vminsert:
            replicaCount: 1

    dex:
      enabled: true
      httpRoute:
        parentRefs:
          - name: mothership-gateway
            namespace: kof
      config:
        issuer: https://dex.example.com:8443
        connectors: []
        enablePasswordDB: true
        staticPasswords:
          - email: "admin@example.com"
            hash: ""
            username: "admin"
            userID: "1"
        oauth2:
          passwordConnector: local
        staticClients:
          - id: grafana-id
            redirectURIs:
              - "https://grafana.example.com:8443/login/generic_oauth"
            name: "Grafana"
            secret: grafana-secret

        # Example OIDC connector configuration for Google with multi-tenancy support
        # connectors:
        #   - type: oidc
        #     id: google
        #     name: Google
        #     config:
        #       issuer: https://accounts.google.com
        #       clientID: ""
        #       clientSecret: ""
        #       redirectURI: https://dex.example.com/callback
        #       insecureEnableGroups: true
        #       claimModifications:
        #         newGroupFromClaims:
        #         - prefix: "tenant"
        #           delimiter: ":"
        #           clearDelimiter: false
        #           claims:
        #             - hd
        #       scopes:
        #         - openid
        #         - email
        #         - profile

    promxy:
      replicaCount: 1
      gateway:
        enabled: true

    # Enable Grafana for local development
    grafana:
      installForTests: true
      enabled: true
      security:
        create_secret: true
      root_url: https://grafana.example.com:8443
      gateway:
        # Disable the gateway to use Dex in Grafana for authentication in local environment
        enabled: true
        httpRoute:
          spec:
            hostnames:
              - grafana.example.com
      config:
        users:
          viewers_can_edit: "true"

    cert-manager:
      cluster-issuer:
        create: true

    gateway:
      enabled: true
      annotations: {}
      spec:
        listeners:
          - name: http
            protocol: HTTP
            port: 80
          - name: https
            protocol: HTTPS
            port: 8443
            hostname: "*.example.com"
            tls:
              mode: Terminate
              certificateRefs:
                - kind: Secret
                  name: kof-https

    # Enable metrics-server for local kind cluster
    metrics-server:
      enabled: true
      args:
        - "--kubelet-insecure-tls"

    kube-state-metrics:
      enabled: true

    victoria-traces-multilevel-select:
      enabled: true
      replicaCount: 1

    victoria-logs-multilevel-select:
      enabled: true
      replicaCount: 1

# KOF Regional - MultiClusterService template for regional clusters
kof-regional:
  values:
    collectors:
      opentelemetry-kube-stack:
        defaultCRConfig:
          env:
            - name: PKI_PATH
              value: etc/kubernetes
    storage:
      victoriametrics:
        vmcluster:
          spec:
            vmstorage:
              storage:
                volumeClaimTemplate:
                  spec:
                    resources:
                      requests:
                        storage: 10Gi
        vlcluster_audit:
          spec:
            vlstorage:
              storage:
                volumeClaimTemplate:
                  spec:
                    resources:
                      requests:
                        storage: 10Gi
      victoria-logs-cluster:
        vlstorage:
          persistentVolume:
            size: 10Gi
      victoria-traces-cluster:
        vtstorage:
          persistentVolume:
            size: 10Gi

# MultiClusterService template to collect from child clusters
# and optionally from Management cluster.
kof-child:
  values:
    fromManagement:
      collectors:
        opentelemetry-kube-stack:
          defaultCRConfig:
            env:
              - name: PKI_PATH
                value: etc/kubernetes
      storage:
        cert-manager:
          cluster-issuer:
            create: false
