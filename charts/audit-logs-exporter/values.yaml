# -- Number of seconds to retain completed/failed jobs.
# Reduce to save etcd space in long-running clusters.
successfulJobsHistoryLimit: 3
failedJobsHistoryLimit: 5

# -- CronJob schedule (UTC). Default: 5 minutes past every hour.
# Running at :05 with exportDelay=5m means the job looks back to exactly :00,
# capturing the full previous-hour window without missing the last few minutes.
schedule: "5 * * * *"

# -- Time zone for the CronJob schedule (requires k8s >=1.27).
timeZone: "UTC"

# -- Kubernetes concurrency policy. Forbid prevents overlapping runs, which
# satisfies the spec requirement that concurrent runs against the same window
# must not produce duplicates.
concurrencyPolicy: Forbid

image:
  repository: ghcr.io/k0rdent/kof/kof-audit-logs-exporter
  tag: ""  # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

# -- Resource requests/limits for the exporter container.
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# -- VictoriaLogs base URL.
vlogsURL: "http://vlselect-audit-logs:9471"

# -- Comma-separated list of audit streams to export.
# Default: both streams defined in the spec.
streams: "tenant-audit-log,platform-audit-log"

# -- Comma-separated list of tenant IDs for tenant-audit-log.
# Leave empty to auto-discover tenants from VictoriaLogs.
tenants: ""

# -- How long after the hour boundary to wait before exporting a window.
# Absorbs late/out-of-order events.  Value is a Go duration string.
exportDelay: "5m"

# -- How many hours back to look for un-exported windows on each run.
catchupHours: "24"

# -- Compliance mode. When true, the exporter aborts if the S3 bucket does
# not have WORM/Object-lock enabled.
complianceMode: "false"

# -- Producer name embedded in every manifest.
producerName: "audit-logs-exporter"

# -- Producer version embedded in every manifest.  Defaults to chart appVersion.
producerVersion: ""

s3:
  # -- S3-compatible endpoint URL (e.g. http://minio.minio.svc.cluster.local:9000).
  endpoint: ""
  # -- Target bucket name.
  bucket: ""
  # -- Key prefix inside the bucket (no leading/trailing slash).
  prefix: "audit"
  # -- AWS/S3 region.
  region: "us-east-1"
  # -- Use path-style S3 addressing. Required for MinIO and most self-hosted S3.
  usePathStyle: "true"
  # -- Skip TLS certificate verification. Set to "true" only in development.
  forceHTTP: "false"

  # -- Credentials are stored in a Secret referenced below.
  # If existingSecret is set, the chart will reference that Secret instead of
  # creating a new one.
  existingSecret: ""
  secretName: "audit-logs-exporter-s3-credentials"

  credentials:
    # -- S3 access key.  Written to the Secret when existingSecret is empty.
    accessKey: ""
    # -- S3 secret key.  Written to the Secret when existingSecret is empty.
    secretKey: ""

kms:
  # -- Key reference passed to the signer.
  # For the built-in LocalSigner this is the HMAC key (base64-encoded or raw string).
  # For AWS KMS set this to the key ARN / alias.
  keyID: "local-dev-key"

serviceAccount:
  # -- Create a dedicated ServiceAccount for the CronJob.
  create: true
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}

# -- Node selector for the Job pods.
nodeSelector: {}

# -- Tolerations for the Job pods.
tolerations: []

# -- Affinity rules for the Job pods.
affinity: {}
