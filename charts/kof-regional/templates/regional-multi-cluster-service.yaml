{{- $global := .Values.global | default dict }}
{{- $globalGlobal := dict "global" $global }}
{{- $customRegistry := $global.registry | default "" }}

{{- $regionless := .Values.regionless.enabled }}

{{- $istio := .Values.istio.enabled }}
{{- if $istio }}
  {{- $ns := lookup "v1" "Namespace" "" ($global.namespace | default "kof") }}
  {{- if $ns | dig "metadata" "labels" "istio-injection" "" | ne "enabled" }}
    {{- $istio = false }}
  {{- end }}
{{- end }}

{{- $ingressEnabled := and (not $istio) (index $.Values "ingress-nginx" "enabled") }}

{{- $envoyGatewayEnabled := and (not $istio) (index $.Values "envoy-gateway" "enabled") }}
{{- $gatewayEnabled := and (not $istio) (index $.Values "gateway" "enabled") }}
{{- $gatewayManaged := and (not $istio) (index $.Values "gateway" "managed") }}

apiVersion: k0rdent.mirantis.com/v1beta1
kind: MultiClusterService
metadata:
{{- if $istio }}
  name: kof-istio-regional-cluster
{{- else }}
  name: kof-regional-cluster
{{- end }}
spec:
  keepServicesOnSelectorMismatch: true
  clusterSelector:
    matchLabels:
    {{- if $regionless }}
      k0rdent.mirantis.com/management-cluster: "true"
      # Workaround for https://github.com/k0rdent/kcm/issues/2610
    {{- else }}
      k0rdent.mirantis.com/kof-cluster-role: regional
      {{- if not $.Values.autoUpgrade }}
      k0rdent.mirantis.com/kof-version: {{ $.Chart.Version | quote }}
      {{- end }}
      {{- if $istio }}
      k0rdent.mirantis.com/istio-role: member
      {{- else }}
    matchExpressions:
      - key: "k0rdent.mirantis.com/istio-role"
        operator: DoesNotExist
      {{- end }}
    {{- end }}

  {{- if $istio }}
  {{- if $.Values.istio.dependsOn }}
  dependsOn:
  {{- range $.Values.istio.dependsOn }}
    - {{ . }}
  {{- end }}
  {{- end }}
  {{- end }}

  serviceSpec:
    {{- if $regionless }}
    provider:
      selfManagement: true
    {{- end }}

    services:
      {{- $version := $.Chart.Version | replace "." "-" }}

      {{- if and (not $istio) (index $.Values "cert-manager" "enabled") }}
      - name: cert-manager
        namespace: {{ $.Release.Namespace }}
        template: {{ index $.Values "cert-manager" "template" }}
        helmOptions:
          wait: true
        {{- if $envoyGatewayEnabled }}
        dependsOn:
          - name: envoy-gateway
            namespace: {{ $.Release.Namespace }}
        {{- end }}
        values: |
          crds:
            enabled: true
          config:
            enableGatewayAPI: {{ $gatewayEnabled }}
        {{- with $customRegistry }}
          image:
            repository: {{ . }}/jetstack/cert-manager-controller
          acmesolver:
            image:
              repository: {{ . }}/jetstack/cert-manager-acmesolver
          cainjector:
            image:
              repository: {{ . }}/jetstack/cert-manager-cainjector
          startupapicheck:
            image:
              repository: {{ . }}/jetstack/cert-manager-startupapicheck
          webhook:
            image:
              repository: {{ . }}/jetstack/cert-manager-webhook
        {{- end }}
      {{- end }}

      {{- if $ingressEnabled }}
      - name: ingress-nginx
        namespace: {{ $.Release.Namespace }}
        template: {{ index $.Values "ingress-nginx" "template" }}
        helmOptions:
          wait: true
        values: |
          {{`{{`}} $ingressNginxValuesFromAnnotation := .Cluster.metadata | dig "annotations" "k0rdent.mirantis.com/kof-ingress-nginx-values" "{}" | fromYaml {{`}}`}}
          {{`{{`}} $ingressNginxValuesFromHelm := `{{ index $.Values "ingress-nginx" "values" | toYaml | nindent 10 }}` | fromYaml {{`}}`}}
          {{`{{`}} $ingressNginxValuesHere := `
          controller:
            image:
              digest: ""
            admissionWebhooks:
              patch:
                image:
                  digest: ""
          ` | fromYaml {{`}}`}}
          {{`{{`}} if eq (get .InfrastructureProvider "kind") "AzureCluster" {{`}}`}}
          {{`{{`}} $ingressNginxValuesAzure := `
          controller:
            service:
              annotations:
                service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: /healthz
          ` | fromYaml {{`}}`}}
          {{`{{`}} $ingressNginxValuesHere = mergeOverwrite $ingressNginxValuesHere $ingressNginxValuesAzure {{`}}`}}
          {{`{{ end }}`}}
          {{`{{`}} $globalValuesFromHelm := `{{ $globalGlobal | toYaml | nindent 10 }}` | fromYaml {{`}}`}}
          {{`{{`}} mergeOverwrite (dict) $globalValuesFromHelm $ingressNginxValuesHere $ingressNginxValuesFromHelm $ingressNginxValuesFromAnnotation | toYaml | nindent 4 {{`}}`}}
      {{- end }}

      {{- if $envoyGatewayEnabled }}
      - name: envoy-gateway
        namespace: {{ $.Release.Namespace }}
        template: {{ index $.Values "envoy-gateway" "template" }}
        helmOptions:
          wait: true
        values: |
          {{`{{`}} $envoyGatewayValuesFromAnnotation := .Cluster.metadata | dig "annotations" "k0rdent.mirantis.com/kof-envoy-gateway-values" "{}" | fromYaml {{`}}`}}
          {{`{{`}} $envoyGatewayValuesHere := `
          config:
            envoyGateway:
              envoyProxy:
                provider:
                  type: Kubernetes
                  kubernetes:
                    envoyService:
                      name: gateway-{clusterName}
          ` | replace "{clusterName}" .Cluster.metadata.name | fromYaml {{`}}`}}
          {{`{{`}} $envoyGatewayValuesFromHelm := `{{ index $.Values "envoy-gateway" "values" | toYaml | nindent 10 }}` | fromYaml {{`}}`}}
          {{`{{`}} $globalValuesFromHelm := `{{ $globalGlobal | toYaml | nindent 10 }}` | fromYaml {{`}}`}}
          {{`{{`}} mergeOverwrite (dict) $globalValuesFromHelm $envoyGatewayValuesFromHelm $envoyGatewayValuesHere $envoyGatewayValuesFromAnnotation | toYaml | nindent 4 {{`}}`}}
      {{- end }}

      {{- $dependsOnList := list }}
      {{- if and (not $istio) (index $.Values "cert-manager" "enabled") }}
        {{- $dependsOnList = append $dependsOnList (dict "name" "cert-manager" "namespace" $.Release.Namespace) }}
      {{- end }}
      {{- if $ingressEnabled }}
        {{- $dependsOnList = append $dependsOnList (dict "name" "ingress-nginx" "namespace" $.Release.Namespace) }}
      {{- end }}

      {{- if index $.Values "kof-operators" "enabled" }}
      - name: kof-operators
        namespace: {{ $.Release.Namespace }}
        template: kof-operators-{{ $version }}
        templateChain: kof-operators-{{ $version }}
        helmOptions:
          wait: true
        {{- if gt (len $dependsOnList) 0 }}
        dependsOn:
        {{- toYaml $dependsOnList | nindent 10 }}
        {{- end }}
        values: |
          {{`{{ $operatorsValuesFromAnnotation := .Cluster.metadata | dig "annotations" "k0rdent.mirantis.com/kof-operators-values" "{}" | fromYaml }}`}}
          {{`{{`}} $operatorsValuesFromHelm := `{{ index $.Values "kof-operators" "values" | toYaml | nindent 10 }}` | fromYaml {{`}}`}}
          {{`{{`}} $globalValuesFromHelm := `{{ $globalGlobal | toYaml | nindent 10 }}` | fromYaml {{`}}`}}
          {{`{{ mergeOverwrite (dict) $globalValuesFromHelm $operatorsValuesFromHelm $operatorsValuesFromAnnotation | toYaml | nindent 4 }}`}}
      {{- end }}

      {{- if index $.Values "victoria-metrics-operator" "enabled" }}
      - name: victoria-metrics-operator
        namespace: {{ $.Release.Namespace }}
        template: {{ index $.Values "victoria-metrics-operator" "template" }}
        helmOptions:
          wait: true

        {{- if index $.Values "kof-operators" "enabled" }}
        dependsOn:
          - name: kof-operators
            namespace: {{ $.Release.Namespace }}
        {{- end }}

        values: |
          {{`{{ $vmoValuesFromAnnotation := .Cluster.metadata | dig "annotations" "k0rdent.mirantis.com/kof-victoria-metrics-operator-values" "{}" | fromYaml }}`}}
          {{`{{`}} $vmoValuesFromHelm := `{{ index $.Values "victoria-metrics-operator" "values" | toYaml | nindent 10 }}` | fromYaml {{`}}`}}
          {{`{{`}} $vmoValuesHere := `
          env:
            - name: VM_GATEWAY_API_ENABLED
              value: "{{ $gatewayEnabled }}"
          ` | fromYaml {{`}}`}}
          {{`{{`}} $globalValuesFromHelm := `{{ $globalGlobal | toYaml | nindent 10 }}` | fromYaml {{`}}`}}
          {{`{{ mergeOverwrite (dict) $globalValuesFromHelm $vmoValuesHere $vmoValuesFromHelm $vmoValuesFromAnnotation | toYaml | nindent 4 }}`}}
      {{- end }}

      - name: kof-storage
        namespace: {{ $.Release.Namespace }}
        template: kof-storage-{{ $version }}
        templateChain: kof-storage-{{ $version }}
        helmOptions:
          wait: true

        {{- if index $.Values "victoria-metrics-operator" "enabled" }}
        dependsOn:
          - name: victoria-metrics-operator
            namespace: {{ $.Release.Namespace }}
        {{- else if index $.Values "kof-operators" "enabled" }}
        dependsOn:
          - name: kof-operators
            namespace: {{ $.Release.Namespace }}
        {{- end }}

        values: |
        {{- $externalDnsEnabled := false }}
        {{- if not $istio }}
          {{- range $_, $secret := (lookup "v1" "Secret" "" "").items }}
              {{- if hasPrefix "external-dns" $secret.metadata.name }}
                {{- $externalDnsEnabled = true }}
              {{- end }}
          {{- end }}
          {{`{{`}} $gatewayName := .Cluster.metadata | dig "annotations" "k0rdent.mirantis.com/kof-gateway-name" "{{ $.Values.gateway.name }}" {{`}}`}}
          {{`{{`}} $gatewayNamespace := .Cluster.metadata | dig "annotations" "k0rdent.mirantis.com/kof-gateway-namespace" "{{ $.Values.gateway.namespace }}" {{`}}`}}

          {{- if $regionless }}
          {{`{{`}} $regionalDomain := "{{ $.Values.regionless.domain }}" {{`}}`}}
          {{`{{`}} $certEmail := "{{ $.Values.regionless.certEmail }}" {{`}}`}}
          {{- else }}
          {{`{{`}} $regionalDomain := .Cluster.metadata | dig "annotations" "k0rdent.mirantis.com/kof-regional-domain" "" {{`}}`}}
          {{`{{ $certEmail := .Cluster.metadata | dig "annotations" "k0rdent.mirantis.com/kof-cert-email" "" }}`}}
          {{- end }}

          {{`{{ $metricsEnabled := not (.Cluster.metadata | dig "annotations" "k0rdent.mirantis.com/kof-write-metrics-endpoint" "") }}`}}
          {{`{{ $metricsHost := $metricsEnabled | ternary (printf "vmauth.%s" $regionalDomain) "" }}`}}
          {{`{{ $grafanaHost := printf "grafana.%s" $regionalDomain }}`}}
          {{`{{ $dexIssuer := printf "https://dex.%s" $regionalDomain }}`}}
          {{`{{ $dexHost := printf "dex.%s" $regionalDomain }}`}}
          {{`{{ $vmuserSecretVersion := getField "StorageVMUserCredentials" "metadata.resourceVersion" }}`}}
        {{- end }}

        {{- if $regionless }}
          {{`{{`}} $clusterName := "{{ $.Values.regionless.clusterName }}" {{`}}`}}
        {{- else }}
          {{`{{`}} $clusterName := .Cluster.metadata.name {{`}}`}}
        {{- end }}

          {{`{{`}} $storageClass := .Cluster.metadata | dig "annotations" "k0rdent.mirantis.com/kof-storage-class" "{{ $.Values.storage | dig "global" "storageClass" "" }}" {{`}}`}}
          {{`{{ $storageValuesFromAnnotation := .Cluster.metadata | dig "annotations" "k0rdent.mirantis.com/kof-storage-values" "{}" | fromYaml }}`}}
          {{`{{`}} $storageValuesFromHelm := `{{ $.Values.storage | toYaml | nindent 10 }}` | fromYaml {{`}}`}}
          {{`{{`}} $storageValuesHere := printf `
          global:
            clusterName: {clusterName}
            storageClass: {storageClass}
          victoria-logs-cluster:
            vlstorage:
              persistentVolume:
                storageClassName: {storageClass}
          victoria-traces-cluster:
            vtstorage:
              persistentVolume:
                storageClassName: {storageClass}
          kof-dashboards:
            kcm:
              enabled: false
            grafana:
              dashboard:
                datasource:
                  regex: ""
                  current: {}
                filters: {}
                istio_dashboard_enabled: {{ $istio }}
          gatewayClass:
            enabled: {{ $gatewayManaged }}
          gateway:
            enabled: {{ $gatewayManaged }}
            spec:
              listeners:
                - name: http
                  protocol: HTTP
                  port: 80
                - name: https
                  protocol: HTTPS
                  port: 443
                  hostname: vmauth.{regionalDomain}
                  tls:
                    mode: Terminate
                    certificateRefs:
                    - kind: Secret
                      name: eg-https
        {{- if $istio }}
          istio_endpoints: true
        {{- else }}
          external-dns:
            enabled: {{ $externalDnsEnabled }}
            extraArgs:
              source: gateway-httproute
            sources:
              - service
              - ingress
              - gateway-httproute
        {{- end }}
          victoriametrics:
            vmauth:
              vmuser:
                enabled: false
              spec:
                ingress:
                  enabled: {{ $ingressEnabled }}
                  tlsHosts:
                    - {metricsHost}
                httpRoute:
                  enabled: {{ $gatewayEnabled }}
                  parentRefs:
                  - name: {gatewayName}
                    namespace: {gatewayNamespace}
                  hostnames:
                  - {metricsHost}
          grafana:
            ingress:
              enabled: {{ $ingressEnabled }}
              host: {grafanaHost}
            gateway:
              enabled: {{ $gatewayEnabled }}
              httpRoute:
                metadata:
                  name: grafana
                spec:
                  parentRefs:
                    - name: {gatewayName}
                      namespace: {gatewayNamespace}
                  hostnames:
                    - {grafanaHost}
                  rules:
                    - backendRefs:
                        - name: grafana-vm-service
                          port: 3000
        {{- if not $istio }}
          cert-manager:
            email: {certEmail}
            {{- if eq (index $.Values "cert-manager" "cluster-issuer" "provider") "letsencrypt" }}
            solvers:
              - http01:
                  {{- if $gatewayEnabled }}
                  gatewayHTTPRoute:
                    parentRefs:
                    - kind: Gateway
                      name: {gatewayName}
                      namespace: {gatewayNamespace}
                  {{- end }}
                  {{- if $ingressEnabled }}
                  ingress:
                    ingressClassName: nginx
                  {{- end }}
            {{- end }}
          dex:
            config:
              issuer: {dexIssuer}
            customIngress:
              enabled: {{ $ingressEnabled }}
              host: {dexHost}
            gateway:
              enabled: {{ $gatewayEnabled }}
              httpRoute:
                spec:
                  parentRefs:
                    - name: {gatewayName}
                      namespace: {gatewayNamespace}
                  hostnames:
                    - {dexHost}
                  rules:
                    - backendRefs:
                        - name: kof-storage-dex
                          port: 5556
          resourcesRefsVersions:
            StorageVMUserCredentials: {vmuserSecretVersion}
        {{- end }}
          ` | replace "{clusterName}" $clusterName | replace "{storageClass}" $storageClass
          {{- if not $istio }}
            | replace "{metricsHost}" $metricsHost | replace "{gatewayName}" $gatewayName | replace "{gatewayNamespace}" $gatewayNamespace | replace "{grafanaHost}" $grafanaHost | replace "{certEmail}" $certEmail | replace "{dexIssuer}" $dexIssuer | replace "{dexHost}" $dexHost | replace "{vmuserSecretVersion}" $vmuserSecretVersion | replace "{regionalDomain}" $regionalDomain
          {{- end }}
            | fromYaml {{`}}`}}
          {{`{{`}} $globalValuesFromHelm := `{{ $globalGlobal | toYaml | nindent 10 }}` | fromYaml {{`}}`}}
          {{`{{ mergeOverwrite (dict) $globalValuesFromHelm $storageValuesHere $storageValuesFromHelm $storageValuesFromAnnotation | toYaml | nindent 4 }}`}}
        valuesFrom:
          - kind: ConfigMap
            {{- if $regionless }}
            name: kof-record-vmrules-{{ $.Values.regionless.clusterName }}
            {{- else }}
            name: kof-record-vmrules-{{`{{ .Cluster.metadata.name }}`}}
            {{- end }}

      - name: kof-collectors
        namespace: {{ $.Release.Namespace }}
        template: kof-collectors-{{ $version }}
        templateChain: kof-collectors-{{ $version }}
        helmOptions:
          wait: true
        dependsOn:
          - name: kof-storage
            namespace: {{ $.Release.Namespace }}
        values: |
        {{- if $regionless }}
          {{`{{`}} $clusterName := "{{ $.Values.regionless.clusterName }}" {{`}}`}}
        {{- else }}
          {{`{{`}} $clusterName := .Cluster.metadata.name {{`}}`}}
        {{- end }}

          {{`{{ $vmuserSecretVersion := getField "StorageVMUserCredentials" "metadata.resourceVersion" }}`}}
          {{`{{ $collectorsValuesFromAnnotation := .Cluster.metadata | dig "annotations" "k0rdent.mirantis.com/kof-collectors-values" "{}" | fromYaml }}`}}
          {{`{{`}} $collectorsValuesFromHelm := `{{ $.Values.collectors | toYaml | nindent 10 }}` | fromYaml {{`}}`}}
          {{`{{`}} $collectorsValuesHere := `
          global:
            clusterName: {clusterName}
            clusterNamespace: {clusterNamespace}

          {{- if $regionless }}
          kcm:
            monitoring: true
          {{- end }}

          opentelemetry-kube-stack:
            clusterName: {clusterName}
            collectors:
            {{- if $istio }}
              controller-k0s:
                enabled: false
            {{- end }}
              daemon:
                image:
                  tag: v{{ $.Chart.AppVersion | trimPrefix "v" }}
              {{- if $istio }}
                hostNetwork: false
              {{- else }}
                hostNetwork: true
                observability:
                  metrics:
                    disablePrometheusAnnotations: false
                    enableMetrics: false
                podAnnotations:
                  prometheus.io/ip4: ${env:OTEL_K8S_NODE_IP}
              {{- end }}
                config:
                {{- if not $istio }}
                  receivers:
                    prometheus:
                      api_server:
                        server_config:
                          endpoint: ${env:OTEL_K8S_NODE_IP}:9090
                    otlp:
                      protocols:
                        grpc:
                          endpoint: 0.0.0.0:4317
                        http:
                          endpoint: 0.0.0.0:4318
                {{- end }}
                  service:
                    extensions:
                      - k8s_observer
                      - file_storage/filelogreceiver
                      - file_storage/filelogsyslogreceiver
                      - file_storage/filelogk8sauditreceiver
                      - file_storage/journaldreceiver
                      - file_storage/exporters

                    {{- if not $istio }}
                    telemetry:
                      metrics:
                        readers:
                          - pull:
                              exporter:
                                prometheus:
                                  host: ${env:OTEL_K8S_NODE_IP}
                                  port: 8888
                    {{- end }}
            defaultCRConfig:
              podAnnotations:
                k0rdent.mirantis.com/kof-vmuser-secret-version: "{vmuserSecretVersion}"
              config:
                processors:
                  resource/k8sclustername:
                    attributes:
                    - action: insert
                      key: k8s.cluster.name
                      value: {clusterName}
                    - action: insert
                      key: k8s.cluster.namespace
                      value: {clusterNamespace}
                exporters:
                  debug: {}
                  prometheusremotewrite:
                    external_labels:
                      cluster: {clusterName}
                      clusterNamespace: {clusterNamespace}
          opencost:
            opencost:
              prometheus:
                existingSecretName: ""
                username_key: ""
                password_key: ""
              exporter:
                defaultClusterId: {clusterName}
                extraEnv:
                  CLUSTER_NAME: {clusterName}
                  EMIT_KSM_V1_METRICS: "false"
                  EMIT_KSM_V1_METRICS_ONLY: "true"
          ` | replace "{clusterName}" $clusterName | replace "{clusterNamespace}" .Cluster.metadata.namespace
            | replace "{vmuserSecretVersion}" $vmuserSecretVersion | fromYaml {{`}}`}}
          {{`{{`}} $globalValuesFromHelm := `{{ $globalGlobal | toYaml | nindent 10 }}` | fromYaml {{`}}`}}
          {{`{{ mergeOverwrite (dict) $globalValuesFromHelm $collectorsValuesHere $collectorsValuesFromHelm $collectorsValuesFromAnnotation | toYaml | nindent 4 }}`}}

      {{- if $.Values.fileWatcher.enabled }}
      - name: kof-audit-policy-watcher
        namespace: {{ $.Release.Namespace }}
        template: kof-file-watcher-{{ $version }}
        templateChain: kof-file-watcher-{{ $version }}
        dependsOn:
          - name: kof-collectors
            namespace: {{ $.Release.Namespace }}
        values: |
          {{`{{ $watcherValuesFromAnnotation := .Cluster.metadata | dig "annotations" "k0rdent.mirantis.com/kof-file-watcher-values" "{}" | fromYaml }}`}}
          {{`{{`}} $watcherValuesFromHelm := `{{ $.Values.fileWatcher | toYaml | nindent 10 }}` | fromYaml {{`}}`}}
          {{`{{`}} $watcherValuesHere := `
          serviceMonitor:
            enabled: true
          baseline:
            enabled: true
          watchPaths:
            - /etc/kubernetes/audit-policy.yaml
          volumes:
            - name: audit-policy
              hostPath:
                path: /etc/kubernetes/audit-policy.yaml
                type: FileOrCreate
          volumeMounts:
            - name: audit-policy
              mountPath: /etc/kubernetes/audit-policy.yaml
              readOnly: true
          hostNetwork: true
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: node-role.kubernetes.io/control-plane
                        operator: Exists
          ` | fromYaml {{`}}`}}
          {{`{{`}} $globalValuesFromHelm := `{{ $globalGlobal | toYaml | nindent 10 }}` | fromYaml {{`}}`}}
          {{`{{ mergeOverwrite (dict) $globalValuesFromHelm $watcherValuesHere $watcherValuesFromHelm $watcherValuesFromAnnotation | toYaml | nindent 4 }}`}}
      {{- end }}
    templateResourceRefs:
    - identifier: RegionalKCMCluster
      optional: true
      resource:
        apiVersion: cluster.x-k8s.io/v1beta1
        kind: Cluster
        name: "{{`{{ .Cluster.metadata.name }}`}}"
        namespace: "{{`{{ .Cluster.metadata.namespace }}`}}"
    - identifier: RegionalSveltosCluster
      optional: true
      resource:
        apiVersion: lib.projectsveltos.io/v1beta1
        kind: SveltosCluster
        name: "{{`{{ .Cluster.metadata.name }}`}}"
        namespace: "{{`{{ .Cluster.metadata.namespace }}`}}"
    - identifier: StorageVMUserCredentials
      optional: true
      resource:
        apiVersion: v1
        kind: Secret
        name: kof-vmuser-creds-admin-{{`{{ (printf "kof-%s/%s" .Cluster.metadata.name .Cluster.metadata.namespace) | adler32sum }}`}}
        namespace: {{ $.Release.Namespace }}
