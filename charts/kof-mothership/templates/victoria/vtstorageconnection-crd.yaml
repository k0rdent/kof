            properties:
              target_storage_node:
                description: TargetStorageNode defines the connection details for
                  the VictoriaMetrics storage node that this VTCluster should connect
                  to.
                properties:
                  address:
                    description: Address of the storage node in the format "host:port".
                    type: string
                  secret:
                    description: |-
                      Secrets is a list of Secrets in the same namespace as the Application
                      object, which shall be mounted into the Application container
                      at /etc/vm/secrets/SECRET_NAME folder. The secret should have keys
                      "username" and "password" for the respective credentials.
                    properties:
                      name:
                        description: |-
                          Name of the Secret in the same namespace as the Application object,
                          which shall be mounted into the Application container at /etc/vm/secrets/SECRET_NAME folder.
                        type: string
                      password_key:
                        description: Key in the Secret that contains the password
                          for authentication with the storage node.
                        type: string
                      username_key:
                        description: Key in the Secret that contains the username
                          for authentication with the storage node.
                        type: string
                    required:
                    - name
                    - password_key
                    - username_key
                    type: object
                  tls_config:
