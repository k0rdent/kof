# -- Number of seconds to retain completed/failed jobs.
successfulJobsHistoryLimit: 3
failedJobsHistoryLimit: 5

# -- CronJob schedule (UTC). Default: 5 minutes past every hour.
schedule: "5 * * * *"

# -- Time zone for the CronJob schedule (requires k8s >=1.27).
timeZone: "UTC"

# -- Kubernetes concurrency policy. Forbid prevents overlapping runs.
concurrencyPolicy: Forbid

image:
  repository: ghcr.io/k0rdent/kof/cold-storage-exporter
  tag: ""  # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

# -- Resource requests/limits for the exporter container.
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# -- Sources to export. Comma-separated list of: metrics, logs, traces.
sources: "metrics,logs"

# -- VictoriaMetrics base URL (for metrics export).
vmURL: "http://vmselect-cluster.kof.svc.cluster.local:8481/select/0/prometheus"

# -- VictoriaLogs base URL (for logs export).
vlogsURL: "http://kof-storage-victoria-logs-cluster-vlselect.kof.svc.cluster.local:9471"

# -- VictoriaTraces base URL (LogsQL API on port 10471; for traces export).
vtracesURL: "http://kof-storage-vt-cluster-vtselect.kof.svc.cluster.local:10471"

# -- Comma-separated list of tenant IDs to export.
# Leave empty to auto-discover tenants from the source.
tenants: ""

# -- Comma-separated list of cluster names to export.
# Leave empty to auto-discover clusters from the source.
clusters: ""

# -- How long after the hour boundary to wait before exporting a window.
# Absorbs late/out-of-order events. Value is a Go duration string.
exportDelay: "5m"

# -- How many hours back to look for un-exported windows on each run.
catchupHours: "24"

s3:
  # -- S3-compatible endpoint URL (e.g. http://minio.minio.svc.cluster.local:9000).
  endpoint: ""
  # -- Target bucket name.
  bucket: ""
  # -- Key prefix inside the bucket (no leading/trailing slash).
  prefix: "telemetry"
  # -- AWS/S3 region.
  region: "us-east-1"
  # -- Use path-style S3 addressing. Required for MinIO and most self-hosted S3.
  usePathStyle: "true"
  # -- Skip TLS certificate verification. Set to "true" only in development.
  forceHTTP: "false"

  # -- If existingSecret is set, the chart will reference that Secret instead of
  # creating a new one.
  existingSecret: ""
  secretName: "cold-storage-exporter-s3-credentials"

  credentials:
    # -- S3 access key. Written to the Secret when existingSecret is empty.
    accessKey: ""
    # -- S3 secret key. Written to the Secret when existingSecret is empty.
    secretKey: ""

serviceAccount:
  # -- Create a dedicated ServiceAccount for the CronJob.
  create: true
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}

# -- Node selector for the Job pods.
nodeSelector: {}

# -- Tolerations for the Job pods.
tolerations: []

# -- Affinity rules for the Job pods.
affinity: {}
