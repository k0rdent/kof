{{- $global := .Values.global | default dict }}
{{- if .Values.victoriametrics.enabled }}
{{- if .Values.victoriametrics.vmauth.enabled }}
{{- if (index .Values "victoriametrics" "vmauth" | default dict).enabled | default false }}
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMAuth
metadata:
  name: cluster
  namespace: {{ .Release.Namespace }}
spec:
  {{- $spec := deepCopy .Values.victoriametrics.vmauth.spec }}
  {{- if not (index $spec.extraArgs "pprofAuthKey") }}
  {{- $_ := set $spec.extraArgs "pprofAuthKey" (randAlphaNum 32) }}
  {{- end }}
  {{- if not (index $spec.extraArgs "metricsAuthKey") }}
  {{- $_ := set $spec.extraArgs "metricsAuthKey" (randAlphaNum 32) }}
  {{- end }}
  {{- if not (index $spec.extraArgs "flagsAuthKey") }}
  {{- $_ := set $spec.extraArgs "flagsAuthKey" (randAlphaNum 32) }}
  {{- end }}
  {{- if not (index $spec.extraArgs "reloadAuthKey") }}
  {{- $_ := set $spec.extraArgs "reloadAuthKey" (randAlphaNum 32) }}
  {{- end }}
  {{- if hasKey $spec "ingress" }}
  {{- if $spec.ingress.enabled }}
    {{- if not (get $spec.ingress.annotations "cert-manager.io/cluster-issuer") }}
    {{- $_ := set $spec.ingress.annotations "cert-manager.io/cluster-issuer" (include "cert-manager.cluster-issuer.name" $ )}}
    {{- $_ := mergeOverwrite $spec.ingress.annotations (include "cert-manager.acme-annotation" $ | fromYaml )}}
    {{- end }}
  {{- else }}
    {{- $_ := unset $spec "ingress" }}
  {{- end }}
  {{- end }}
  {{- if not $spec.httpRoute.enabled }}
    {{- $_ := unset $spec "httpRoute" }}
  {{- end }}
  {{- toYaml $spec | nindent 2 }}
{{- end }}
{{- end }}
{{- end }}
