# -- Part of the regionless setup managed by the `kof` umbrella chart.
regionless:
  enabled: false
  clusterName: mothership
  domain: mothership.example.com
  certEmail: admin@example.com

# -- Governed by `autoUpgrade` in the `kof` umbrella chart.
autoUpgrade: false

cert-manager:
  enabled: true
  template: cert-manager-v1-19-3
  cluster-issuer:
    provider: letsencrypt

ingress-nginx:
  enabled: false
  template: ingress-nginx-4-14-3
  values: {}

# -- envoy-gateway helm chart.
envoy-gateway:
  enabled: true
  template: gateway-helm-v1-7-2
  values: {}

gateway:
  # -- Enables Gateway API integration.
  enabled: true

  # -- Manage Gateway CR.
  managed: true

  # -- Name of the Gateway CR deployed by kof-storage on regional/regionless clusters.
  name: storage-gateway
  namespace: kof

  # -- HTTPS port for the storage Gateway listener.
  httpsPort: 443

victoria-metrics-operator:
  enabled: true
  template: victoria-metrics-operator-0-58-1
  values:
    global:
      cluster:
        dnsDomain: cluster.local
    serviceMonitor:
      enabled: true
      vm: false
    operator:
      disable_prometheus_converter: true
    crds:
      plain: true
      cleanup:
        enabled: false

kof-operators:
  enabled: true
  values: {}

collectors: {}
storage: {}

# -- File watcher deployed to regional clusters via MCS to watch the audit-policy file.
fileWatcher:
  # -- Set to true to deploy kof-file-watcher on regional clusters.
  enabled: true
