name: Test KCM Region with KOF

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
      - release/*
    paths:
      - "kof-operator/**"
      - "charts/**"
      - "scripts/requirements.txt"
      - "tests/live/**"
      - "tests/reference/**"
      - "!**.md"
      - ".github/workflows/pr_test_kcm_region_with_kof.yaml"

jobs:
  deploy:
    defaults:
      run:
        shell: bash --noprofile --norc -euo pipefail {0}
    strategy:
      fail-fast: false
      matrix:
        target: ["dev"]
    name: Install KOF on KCM Regional Cluster
    runs-on: ${{ github.repository_owner == 'k0rdent' && 'kof' || 'ubuntu-latest' }}
    steps:
      - name: "[PR] Checkout"
        uses: actions/checkout@v7
      - name: "[PR] Shared setup"
        uses: ./.github/actions/shared-setup
      - name: "[PR] Setup Go"
        uses: actions/setup-go@v6
        with:
          go-version-file: kof-operator/go.mod
          cache: false
      - name: "[Latest KCM Release] Get version"
        id: kcm_release
        uses: pozetroninc/github-action-get-latest-release@master
        with:
          owner: k0rdent
          repo: kcm
          excludes: prerelease, draft
      - name: "[PR] Install KOF CLI"
        run: |
          make cli-install
      - name: Patch Kind Config
        if: github.repository_owner == 'k0rdent'
        uses: ./.github/actions/kind-config-patch
        with:
          registry-username: ${{ secrets.REGISTRY_CI_USERNAME }}
          registry-password: ${{ secrets.REGISTRY_CI_PASSWORD }}
      - name: "[Latest KCM Release] Create KIND cluster"
        run: |
          make dev kind-deploy KIND_CONFIG_PATH="$PWD/config/kind.yaml"
      - name: "[Latest KCM Release] Start local registry"
        run: |
          make registry-deploy
      - name: "[Latest KCM Release] Install Envoy Gateway"
        run: |
          helm upgrade --install envoy-gateway oci://docker.io/envoyproxy/gateway-helm \
            --version v1.7.2 \
            -n envoy-gateway-system \
            --create-namespace \
            --wait \
            --timeout 10m
      - name: "[Latest KCM Release] Install KCM from release chart"
        run: |
          KCM_TAG="${{ steps.kcm_release.outputs.release }}"
          helm install kcm oci://ghcr.io/k0rdent/kcm/staging/kcm \
            --version "${KCM_TAG#v}" \
            --set regional.cert-manager.config.enableGatewayAPI=true \
            --set cert-manager.config.enableGatewayAPI=true \
             -n kcm-system \
             --create-namespace \
             --wait \
            --timeout 10m
      - name: "[Latest KCM Release] Wait for mgmt/kcm"
        run: |
          kubectl wait --for create mgmt/kcm --timeout=1m
          kubectl patch mgmt/kcm --type='json' -p '[{"op": "replace", "path": "/spec/providers", "value":[{"name":"projectsveltos"}]}]'
          kubectl wait --for=condition=Ready mgmt/kcm --timeout=10m
      - name: "[PR] Push KOF Helm Charts"
        run: |
          make helm-push
      - name: Run KIND cloud provider
        run: docker run -d --rm --network kind -v /var/run/docker.sock:/var/run/docker.sock registry.k8s.io/cloud-provider-kind/cloud-controller-manager:v0.10.0 --gateway-channel="disabled"
      - name: "[PR] Deploy KOF components on Mothership cluster"
        run: |
          make dev-deploy M2M=true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install -r scripts/requirements.txt
      - name: "[PR] Grafana gateway smoke test"
        run: |
          make dev-grafana-smoke
      - name: "[PR] Run KIND KCM Regional cluster with KOF"
        run: |
          make dev-adopted-deploy KIND_CLUSTER_NAME=regional-adopted KIND_CONFIG_PATH=$PWD/config/kind.yaml
      - name: "[PR] Deploy KOF components on adopted Regional cluster"
        run: |
          make ${{ matrix.target }}-kcm-region-deploy-adopted KCM_REGION_NAME=regional-adopted
      - name: "[PR] Run KIND kof Child cluster"
        run: |
          make dev-adopted-deploy KIND_CLUSTER_NAME=child-adopted KCM_REGION_NAME=regional-adopted KIND_CONFIG_PATH=$PWD/config/kind.yaml
      - name: "[PR] Configure CoreDNS hosts on Child cluster"
        run: |
          make dev-coredns
      - name: "[PR] Deploy KOF components on adopted Child cluster"
        run: |
          make ${{ matrix.target }}-child-deploy-adopted
      - name: Waiting 10m for metrics collection
        run: sleep 10m
      - run: make dev-grafana-port-forward
      - name: Checking all collectors are up and running
        run: |
          KUBECTL_CONTEXT=kind-regional-adopted make wait-otel-collectors
          KUBECTL_CONTEXT=kind-child-adopted make wait-otel-collectors
      - name: Checking metrics
        run: python -m pytest scripts/metrics_smoke_test.py -v
      - name: Checking Grafana dashboards and queries
        run: python -m pytest -c tests/live/pytest.ini tests/live -qq --tb=short
      - name: Checking audit logs
        run: python -m pytest scripts/audit_logs_smoke_test.py -v --log-cli-level=INFO
      - name: Make support-bundle
        if: ${{ failure() }}
        run: |
          make support-bundle
          make support-bundle KUBECTL_CONTEXT=kind-regional-adopted
          make support-bundle KUBECTL_CONTEXT=kind-child-adopted
      - name: Archive support-bundle
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}-support-bundles.tar.gz
          path: ./support-bundle-*.tar.gz
