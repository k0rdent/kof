# -- Governed by `autoUpgrade` in the `kof` umbrella chart.
autoUpgrade: false

cert-manager:
  enabled: true
  template: cert-manager-v1-19-3

collectors:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # While this duplicates default `env` value from `kof-collectors/values.yaml`,
  # the kof-child MCS concatenates this `collectors...env` (or its override)
  # with KOF_VM_USER/KOF_VM_PASSWORD env vars, as Helm does not merge lists.
  opentelemetry-kube-stack:
    defaultCRConfig:
      env:
        - name: PKI_PATH
          value: var/lib/k0s

fromManagement:
  cluster:
    name: mothership
    namespace: kcm-system

  # -- Collect metrics/logs/traces from Management cluster and export to Management cluster.
  toManagementCluster:
    enabled: false

  # -- Collect metrics/logs/traces from Management cluster and export to Regional cluster.
  toRegionalCluster:
    name: ""
    namespace: kcm-system

  # -- Additional values for kof-collectors chart deployed to Management cluster.
  collectors: {}

  # -- Additional values for kof-storage chart deployed to Management cluster.
  storage: {}

operators:
  grafana-operator:
    enabled: false

istio:
  # -- Installs resources required for the KOF to work properly with the main Istio chart.
  enabled: true

  dependsOn:
    - k0rdent-istio-network

# -- File watcher deployed to child clusters via MCS to watch the audit-policy file.
fileWatcher:
  # -- Set to true to deploy kof-file-watcher on child clusters.
  enabled: true
  