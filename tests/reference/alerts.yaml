  expr: capi_machine_info{control_plane_name=""} and on(name, namespace, cluster_name) (capi_machine_status_condition{status="False",
    type="NodeHealthy"} == 1)
  for: 30m
  severity: error
  metrics:
  - capi_machine_info
  - capi_machine_status_condition
  - cluster_name
  resource: kof-mothership-cluster-api
  namespace: kof
  source_chart: kof-mothership
- name: MachineWorkerNodeNotReady
  group: cluster-api
  expr: capi_machine_info{control_plane_name=""} and on(name, namespace, cluster_name) (capi_machine_status_condition{status="False",
    type="NodeReady"} == 1)
  for: 30m
  severity: error
  metrics:
  - capi_machine_info
  - capi_machine_status_condition
  - cluster_name
  resource: kof-mothership-cluster-api
  namespace: kof
  source_chart: kof-mothership
- name: ConfigReloaderSidecarErrors
  group: config-reloaders
  expr: max_over_time(reloader_last_reload_successful{namespace=~".+"}[5m]) == 0
  for: 10m
  severity: warning
  metrics:
  - reloader_last_reload_successful
  resource: kof-mothership-config-reloaders
  namespace: kof
  source_chart: kof-mothership
- name: etcdMembersDown
  group: etcd
  expr: max without (endpoint) ( sum without (instance, pod) (up{job=~".*etcd.*"} == bool 0) or count without (To) ( sum without
    (instance, pod) (rate(etcd_network_peer_sent_failures_total{job=~".*etcd.*"}[120s])) > 0.01 ) ) > 0
  for: 20m
  severity: warning
  metrics:
  - etcd_network_peer_sent_failures_total
  - up
  resource: kof-mothership-etcd
  namespace: kof
  source_chart: kof-mothership
- name: etcdInsufficientMembers
  group: etcd
  expr: sum(up{job=~".*etcd.*"} == bool 1) without (instance, pod) < ((count(up{job=~".*etcd.*"}) without (instance, pod)
    + 1) / 2)
  for: 3m
  severity: critical
  metrics:
  - up
  resource: kof-mothership-etcd
  namespace: kof
  source_chart: kof-mothership
- name: etcdNoLeader
  group: etcd
  expr: etcd_server_has_leader{job=~".*etcd.*"} == 0
  for: 1m
  severity: critical
  metrics:
  - etcd_server_has_leader
  resource: kof-mothership-etcd
  namespace: kof
  source_chart: kof-mothership
- name: etcdHighNumberOfLeaderChanges
  group: etcd
  expr: increase((max without (instance, pod) (etcd_server_leader_changes_seen_total{job=~".*etcd.*"}) or 0*absent(etcd_server_leader_changes_seen_total{job=~".*etcd.*"}))[15m:1m])
    >= 4
  for: 5m
  severity: warning
  metrics:
  - etcd_server_leader_changes_seen_total
  - m:1m
  resource: kof-mothership-etcd
  namespace: kof
  source_chart: kof-mothership
- name: etcdHighNumberOfFailedGRPCRequests
  group: etcd
  expr: 100 * sum(rate(grpc_server_handled_total{job=~".*etcd.*", grpc_code=~"Unknown|FailedPrecondition|ResourceExhausted|Internal|Unavailable|DataLoss|DeadlineExceeded"}[5m]))
    without (grpc_type, grpc_code) / sum(rate(grpc_server_handled_total{job=~".*etcd.*"}[5m])) without (grpc_type, grpc_code)
    > 1
  for: 10m
  severity: warning
  metrics:
  - grpc_code
  - grpc_server_handled_total
  - grpc_type
  resource: kof-mothership-etcd
  namespace: kof
  source_chart: kof-mothership
- name: etcdHighNumberOfFailedGRPCRequests
  group: etcd
  expr: 100 * sum(rate(grpc_server_handled_total{job=~".*etcd.*", grpc_code=~"Unknown|FailedPrecondition|ResourceExhausted|Internal|Unavailable|DataLoss|DeadlineExceeded"}[5m]))
    without (grpc_type, grpc_code) / sum(rate(grpc_server_handled_total{job=~".*etcd.*"}[5m])) without (grpc_type, grpc_code)
    > 5
  for: 5m
  severity: critical
  metrics:
  - grpc_code
  - grpc_server_handled_total
  - grpc_type
  resource: kof-mothership-etcd
  namespace: kof
  source_chart: kof-mothership
- name: etcdGRPCRequestsSlow
  group: etcd
  expr: histogram_quantile(0.99, sum(rate(grpc_server_handling_seconds_bucket{job=~".*etcd.*", grpc_method!="Defragment",
    grpc_type="unary"}[5m])) without(grpc_type)) > 0.15
  for: 10m
  severity: critical
  metrics:
  - grpc_server_handling_seconds_bucket
  - grpc_type
  resource: kof-mothership-etcd
  namespace: kof
  source_chart: kof-mothership
- name: etcdMemberCommunicationSlow
  group: etcd
  expr: histogram_quantile(0.99, rate(etcd_network_peer_round_trip_time_seconds_bucket{job=~".*etcd.*"}[5m])) > 0.15
  for: 10m
  severity: warning
  metrics:
  - etcd_network_peer_round_trip_time_seconds_bucket
  resource: kof-mothership-etcd
  namespace: kof
  source_chart: kof-mothership
- name: etcdHighNumberOfFailedProposals
  group: etcd
  expr: rate(etcd_server_proposals_failed_total{job=~".*etcd.*"}[15m]) > 5
  for: 15m
  severity: warning
  metrics:
  - etcd_server_proposals_failed_total
  resource: kof-mothership-etcd
  namespace: kof
  source_chart: kof-mothership
- name: etcdHighFsyncDurations
  group: etcd
  expr: histogram_quantile(0.99, rate(etcd_disk_wal_fsync_duration_seconds_bucket{job=~".*etcd.*"}[5m])) > 0.5
  for: 10m
  severity: warning
  metrics:
  - etcd_disk_wal_fsync_duration_seconds_bucket
  resource: kof-mothership-etcd
  namespace: kof
  source_chart: kof-mothership
- name: etcdHighFsyncDurations
  group: etcd
  expr: histogram_quantile(0.99, rate(etcd_disk_wal_fsync_duration_seconds_bucket{job=~".*etcd.*"}[5m])) > 1
  for: 10m
  severity: critical
  metrics:
  - etcd_disk_wal_fsync_duration_seconds_bucket
  resource: kof-mothership-etcd
  namespace: kof
  source_chart: kof-mothership
- name: etcdHighCommitDurations
  group: etcd
  expr: histogram_quantile(0.99, rate(etcd_disk_backend_commit_duration_seconds_bucket{job=~".*etcd.*"}[5m])) > 0.25
  for: 10m
  severity: warning
  metrics:
  - etcd_disk_backend_commit_duration_seconds_bucket
  resource: kof-mothership-etcd
  namespace: kof
  source_chart: kof-mothership
- name: etcdDatabaseQuotaLowSpace
  group: etcd
  expr: (last_over_time(etcd_mvcc_db_total_size_in_bytes{job=~".*etcd.*"}[5m]) / last_over_time(etcd_server_quota_backend_bytes{job=~".*etcd.*"}[5m]))*100
    > 95
  for: 10m
  severity: critical
  metrics:
  - etcd_mvcc_db_total_size_in_bytes
  - etcd_server_quota_backend_bytes
  resource: kof-mothership-etcd
  namespace: kof
  source_chart: kof-mothership
- name: etcdExcessiveDatabaseGrowth
  group: etcd
  expr: predict_linear(etcd_mvcc_db_total_size_in_bytes{job=~".*etcd.*"}[4h], 4*60*60) > etcd_server_quota_backend_bytes{job=~".*etcd.*"}
  for: 10m
  severity: warning
  metrics:
  - etcd_mvcc_db_total_size_in_bytes
  - etcd_server_quota_backend_bytes
  resource: kof-mothership-etcd
  namespace: kof
  source_chart: kof-mothership
- name: etcdDatabaseHighFragmentationRatio
  group: etcd
  expr: (last_over_time(etcd_mvcc_db_total_size_in_use_in_bytes{job=~".*etcd.*"}[5m]) / last_over_time(etcd_mvcc_db_total_size_in_bytes{job=~".*etcd.*"}[5m]))
    < 0.5 and etcd_mvcc_db_total_size_in_use_in_bytes{job=~".*etcd.*"} > 104857600
  for: 10m
  severity: warning
  metrics:
  - etcd_mvcc_db_total_size_in_bytes
  - etcd_mvcc_db_total_size_in_use_in_bytes
  resource: kof-mothership-etcd
  namespace: kof
  source_chart: kof-mothership
- name: TargetDown
  group: general.rules
  expr: 100 * (count(up == 0) BY (tenant,cluster, job, namespace, service) / count(up) BY (tenant,cluster, job, namespace,
    service)) > 10
  for: 10m
  severity: warning
  metrics:
  - tenant
  - up
  resource: kof-mothership-general.rules
  namespace: kof
  source_chart: kof-mothership
- name: Watchdog
  group: general.rules
  expr: vector(1)
  for: ''
  severity: none
  metrics: []
  resource: kof-mothership-general.rules
  namespace: kof
  source_chart: kof-mothership
- name: InfoInhibitor
  group: general.rules
  expr: ALERTS{severity = "info"} == 1 unless on (tenant,namespace) ALERTS{alertname != "InfoInhibitor", severity =~ "warning|critical",
    alertstate="firing"} == 1
  for: ''
  severity: none
  metrics:
  - ALERTS
  - tenant
  resource: kof-mothership-general.rules
  namespace: kof
  source_chart: kof-mothership
- name: KubeAPIErrorBudgetBurn
  group: kube-apiserver-slos
  expr: sum by (tenant,cluster) (apiserver_request:burnrate1h) > (14.40 * 0.01000) and on (tenant,cluster) sum by (tenant,cluster)
    (apiserver_request:burnrate5m) > (14.40 * 0.01000)
  for: 2m
  severity: critical
  metrics:
  - apiserver_request:burnrate1h
  - apiserver_request:burnrate5m
  - tenant
  resource: kof-mothership-kube-apiserver-slos
  namespace: kof
  source_chart: kof-mothership
- name: KubeAPIErrorBudgetBurn
  group: kube-apiserver-slos
  expr: sum by (tenant,cluster) (apiserver_request:burnrate6h) > (6.00 * 0.01000) and on (tenant,cluster) sum by (tenant,cluster)
    (apiserver_request:burnrate30m) > (6.00 * 0.01000)
  for: 15m
  severity: critical
  metrics:
  - apiserver_request:burnrate30m
  - apiserver_request:burnrate6h
  - tenant
  resource: kof-mothership-kube-apiserver-slos
  namespace: kof
  source_chart: kof-mothership
- name: KubeAPIErrorBudgetBurn
  group: kube-apiserver-slos
  expr: sum by (tenant,cluster) (apiserver_request:burnrate1d) > (3.00 * 0.01000) and on (tenant,cluster) sum by (tenant,cluster)
    (apiserver_request:burnrate2h) > (3.00 * 0.01000)
  for: 1h
  severity: warning
  metrics:
  - apiserver_request:burnrate1d
  - apiserver_request:burnrate2h
  - tenant
  resource: kof-mothership-kube-apiserver-slos
  namespace: kof
  source_chart: kof-mothership
- name: KubeAPIErrorBudgetBurn
  group: kube-apiserver-slos
  expr: sum by (tenant,cluster) (apiserver_request:burnrate3d) > (1.00 * 0.01000) and on (tenant,cluster) sum by (tenant,cluster)
    (apiserver_request:burnrate6h) > (1.00 * 0.01000)
  for: 3h
  severity: warning
  metrics:
  - apiserver_request:burnrate3d
  - apiserver_request:burnrate6h
  - tenant
  resource: kof-mothership-kube-apiserver-slos
  namespace: kof
  source_chart: kof-mothership
- name: KubeStateMetricsListErrors
  group: kube-state-metrics
  expr: (sum(rate(kube_state_metrics_list_total{job="kube-state-metrics",result="error"}[5m])) by (tenant,cluster) / sum(rate(kube_state_metrics_list_total{job="kube-state-metrics"}[5m]))
    by (tenant,cluster)) > 0.01
  for: 15m
  severity: critical
  metrics:
  - kube_state_metrics_list_total
  - tenant
  resource: kof-mothership-kube-state-metrics
  namespace: kof
  source_chart: kof-mothership
- name: KubeStateMetricsWatchErrors
  group: kube-state-metrics
  expr: (sum(rate(kube_state_metrics_watch_total{job="kube-state-metrics",result="error"}[5m])) by (tenant,cluster) / sum(rate(kube_state_metrics_watch_total{job="kube-state-metrics"}[5m]))
    by (tenant,cluster)) > 0.01
  for: 15m
  severity: critical
  metrics:
  - kube_state_metrics_watch_total
  - tenant
  resource: kof-mothership-kube-state-metrics
  namespace: kof
  source_chart: kof-mothership
- name: KubeStateMetricsShardingMismatch
  group: kube-state-metrics
  expr: stdvar (kube_state_metrics_total_shards{job="kube-state-metrics"}) by (tenant,cluster) != 0
  for: 15m
  severity: critical
  metrics:
  - kube_state_metrics_total_shards
  - tenant
  resource: kof-mothership-kube-state-metrics
  namespace: kof
  source_chart: kof-mothership
- name: KubeStateMetricsShardsMissing
  group: kube-state-metrics
  expr: 2^max(kube_state_metrics_total_shards{job="kube-state-metrics"}) by (tenant,cluster) - 1 - sum( 2 ^ max by (tenant,cluster,
    shard_ordinal) (kube_state_metrics_shard_ordinal{job="kube-state-metrics"}) ) by (tenant,cluster) != 0
  for: 15m
  severity: critical
  metrics:
  - kube_state_metrics_shard_ordinal
  - kube_state_metrics_total_shards
  - shard_ordinal
  - tenant
  resource: kof-mothership-kube-state-metrics
  namespace: kof
  source_chart: kof-mothership
- name: KubePodCrashLooping
  group: kubernetes-apps
  expr: max_over_time(kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff", job="kube-state-metrics", namespace=~".*"}[5m])
    >= 1
  for: 15m
  severity: warning
  metrics:
  - kube_pod_container_status_waiting_reason
  resource: kof-mothership-kubernetes-apps
  namespace: kof
  source_chart: kof-mothership
- name: KubePodNotReady
  group: kubernetes-apps
  expr: sum by (tenant,namespace, pod, cluster) ( max by (tenant,namespace, pod, cluster) ( kube_pod_status_phase{job="kube-state-metrics",
    namespace=~".*", phase=~"Pending|Unknown|Failed"} ) * on (tenant,namespace, pod, cluster) group_left(owner_kind) topk
    by (tenant,namespace, pod, cluster) ( 1, max by (tenant,namespace, pod, owner_kind, cluster) (kube_pod_owner{owner_kind!="Job"})
    ) ) > 0
  for: 15m
  severity: warning
  metrics:
  - kube_pod_owner
  - kube_pod_status_phase
  - owner_kind
  - tenant
  resource: kof-mothership-kubernetes-apps
  namespace: kof
  source_chart: kof-mothership
- name: KubeDeploymentGenerationMismatch
  group: kubernetes-apps
  expr: kube_deployment_status_observed_generation{job="kube-state-metrics", namespace=~".*"} != kube_deployment_metadata_generation{job="kube-state-metrics",
    namespace=~".*"}
  for: 15m
  severity: warning
  metrics:
  - kube_deployment_metadata_generation
  - kube_deployment_status_observed_generation
  resource: kof-mothership-kubernetes-apps
  namespace: kof
  source_chart: kof-mothership
- name: KubeDeploymentReplicasMismatch
  group: kubernetes-apps
  expr: ( kube_deployment_spec_replicas{job="kube-state-metrics", namespace=~".*"} > kube_deployment_status_replicas_available{job="kube-state-metrics",
    namespace=~".*"} ) and ( changes(kube_deployment_status_replicas_updated{job="kube-state-metrics", namespace=~".*"}[10m])
    == 0 )
  for: 15m
  severity: warning
  metrics:
  - kube_deployment_spec_replicas
  - kube_deployment_status_replicas_available
  - kube_deployment_status_replicas_updated
  resource: kof-mothership-kubernetes-apps
  namespace: kof
  source_chart: kof-mothership
- name: KubeDeploymentRolloutStuck
  group: kubernetes-apps
  expr: kube_deployment_status_condition{condition="Progressing", status="false",job="kube-state-metrics", namespace=~".*"}
    != 0
  for: 15m
  severity: warning
  metrics:
  - kube_deployment_status_condition
  resource: kof-mothership-kubernetes-apps
  namespace: kof
  source_chart: kof-mothership
- name: KubeStatefulSetReplicasMismatch
  group: kubernetes-apps
  expr: ( kube_statefulset_status_replicas_ready{job="kube-state-metrics", namespace=~".*"} != kube_statefulset_replicas{job="kube-state-metrics",
    namespace=~".*"} ) and ( changes(kube_statefulset_status_replicas_updated{job="kube-state-metrics", namespace=~".*"}[10m])
    == 0 )
  for: 15m
  severity: warning
  metrics:
  - kube_statefulset_replicas
  - kube_statefulset_status_replicas_ready
  - kube_statefulset_status_replicas_updated
  resource: kof-mothership-kubernetes-apps
  namespace: kof
  source_chart: kof-mothership
- name: KubeStatefulSetGenerationMismatch
  group: kubernetes-apps
  expr: kube_statefulset_status_observed_generation{job="kube-state-metrics", namespace=~".*"} != kube_statefulset_metadata_generation{job="kube-state-metrics",
    namespace=~".*"}
  for: 15m
  severity: warning
  metrics:
  - kube_statefulset_metadata_generation
  - kube_statefulset_status_observed_generation
  resource: kof-mothership-kubernetes-apps
  namespace: kof
  source_chart: kof-mothership
- name: KubeStatefulSetUpdateNotRolledOut
  group: kubernetes-apps
  expr: ( max by (tenant,namespace, statefulset, job, cluster) ( kube_statefulset_status_current_revision{job="kube-state-metrics",
    namespace=~".*"} unless kube_statefulset_status_update_revision{job="kube-state-metrics", namespace=~".*"} ) * ( kube_statefulset_replicas{job="kube-state-metrics",
    namespace=~".*"} != kube_statefulset_status_replicas_updated{job="kube-state-metrics", namespace=~".*"} ) ) and ( changes(kube_statefulset_status_replicas_updated{job="kube-state-metrics",
    namespace=~".*"}[5m]) == 0 )
  for: 15m
  severity: warning
  metrics:
  - kube_statefulset_replicas
  - kube_statefulset_status_current_revision
  - kube_statefulset_status_replicas_updated
  - kube_statefulset_status_update_revision
  - statefulset
  - tenant
  resource: kof-mothership-kubernetes-apps
  namespace: kof
  source_chart: kof-mothership
- name: KubeDaemonSetRolloutStuck
  group: kubernetes-apps
  expr: ( ( kube_daemonset_status_current_number_scheduled{job="kube-state-metrics", namespace=~".*"} != kube_daemonset_status_desired_number_scheduled{job="kube-state-metrics",
    namespace=~".*"} ) or ( kube_daemonset_status_number_misscheduled{job="kube-state-metrics", namespace=~".*"} != 0 ) or
    ( kube_daemonset_status_updated_number_scheduled{job="kube-state-metrics", namespace=~".*"} != kube_daemonset_status_desired_number_scheduled{job="kube-state-metrics",
    namespace=~".*"} ) or ( kube_daemonset_status_number_available{job="kube-state-metrics", namespace=~".*"} != kube_daemonset_status_desired_number_scheduled{job="kube-state-metrics",
    namespace=~".*"} ) ) and ( changes(kube_daemonset_status_updated_number_scheduled{job="kube-state-metrics", namespace=~".*"}[5m])
    == 0 )
  for: 15m
  severity: warning
  metrics:
  - kube_daemonset_status_current_number_scheduled
  - kube_daemonset_status_desired_number_scheduled
  - kube_daemonset_status_number_available
  - kube_daemonset_status_number_misscheduled
  - kube_daemonset_status_updated_number_scheduled
  resource: kof-mothership-kubernetes-apps
  namespace: kof
  source_chart: kof-mothership
- name: KubeContainerWaiting
  group: kubernetes-apps
  expr: kube_pod_container_status_waiting_reason{reason!="CrashLoopBackOff", job="kube-state-metrics", namespace=~".*"} >
    0
  for: 1h
  severity: warning
  metrics:
  - kube_pod_container_status_waiting_reason
  resource: kof-mothership-kubernetes-apps
  namespace: kof
  source_chart: kof-mothership
- name: KubeDaemonSetNotScheduled
  group: kubernetes-apps
  expr: kube_daemonset_status_desired_number_scheduled{job="kube-state-metrics", namespace=~".*"} - kube_daemonset_status_current_number_scheduled{job="kube-state-metrics",
    namespace=~".*"} > 0
  for: 10m
  severity: warning
  metrics:
  - kube_daemonset_status_current_number_scheduled
  - kube_daemonset_status_desired_number_scheduled
  resource: kof-mothership-kubernetes-apps
  namespace: kof
  source_chart: kof-mothership
- name: KubeDaemonSetMisScheduled
  group: kubernetes-apps
  expr: kube_daemonset_status_number_misscheduled{job="kube-state-metrics", namespace=~".*"} > 0
  for: 15m
  severity: warning
  metrics:
  - kube_daemonset_status_number_misscheduled
  resource: kof-mothership-kubernetes-apps
  namespace: kof
  source_chart: kof-mothership
- name: KubeJobNotCompleted
  group: kubernetes-apps
  expr: time() - max by (tenant,namespace, job_name, cluster) (kube_job_status_start_time{job="kube-state-metrics", namespace=~".*"}
    and kube_job_status_active{job="kube-state-metrics", namespace=~".*"} > 0) > 43200
  for: ''
  severity: warning
  metrics:
  - job_name
  - kube_job_status_active
  - kube_job_status_start_time
  - tenant
  resource: kof-mothership-kubernetes-apps
  namespace: kof
  source_chart: kof-mothership
- name: KubeJobFailed
  group: kubernetes-apps
  expr: kube_job_failed{job="kube-state-metrics", namespace=~".*"} > 0
  for: 15m
  severity: warning
  metrics:
  - kube_job_failed
  resource: kof-mothership-kubernetes-apps
  namespace: kof
  source_chart: kof-mothership
- name: KubeHpaReplicasMismatch
  group: kubernetes-apps
  expr: (kube_horizontalpodautoscaler_status_desired_replicas{job="kube-state-metrics", namespace=~".*"} != kube_horizontalpodautoscaler_status_current_replicas{job="kube-state-metrics",
    namespace=~".*"}) and (kube_horizontalpodautoscaler_status_current_replicas{job="kube-state-metrics", namespace=~".*"}
    > kube_horizontalpodautoscaler_spec_min_replicas{job="kube-state-metrics", namespace=~".*"}) and (kube_horizontalpodautoscaler_status_current_replicas{job="kube-state-metrics",
    namespace=~".*"} < kube_horizontalpodautoscaler_spec_max_replicas{job="kube-state-metrics", namespace=~".*"}) and changes(kube_horizontalpodautoscaler_status_current_replicas{job="kube-state-metrics",
    namespace=~".*"}[15m]) == 0
  for: 15m
  severity: warning
  metrics:
  - kube_horizontalpodautoscaler_spec_max_replicas
  - kube_horizontalpodautoscaler_spec_min_replicas
  - kube_horizontalpodautoscaler_status_current_replicas
  - kube_horizontalpodautoscaler_status_desired_replicas
  resource: kof-mothership-kubernetes-apps
  namespace: kof
  source_chart: kof-mothership
- name: KubeHpaMaxedOut
  group: kubernetes-apps
  expr: kube_horizontalpodautoscaler_status_current_replicas{job="kube-state-metrics", namespace=~".*"} == kube_horizontalpodautoscaler_spec_max_replicas{job="kube-state-metrics",
    namespace=~".*"}
  for: 15m
  severity: warning
  metrics:
  - kube_horizontalpodautoscaler_spec_max_replicas
