# This rule is not used by the project kof-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the k0rdent.mirantis.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kof-operator
    app.kubernetes.io/managed-by: kustomize
  name: vtstorageconnection-editor-role
rules:
- apiGroups:
  - k0rdent.mirantis.com
  resources:
  - vtstorageconnections
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - k0rdent.mirantis.com
  resources:
  - vtstorageconnections/status
  verbs:
  - get
