name: "Release helm charts"
# Usage: Create a new tag at https://github.com/k0rdent/kof/releases/new
# Test: Fork kof repo. Create a tag there. Check how charts are pushed to your OCI repo.

on:
  push:
    tags:
      - "*"
    paths:
      - "charts/**"

jobs:
  release:
    runs-on: ${{ github.repository_owner == 'k0rdent' && 'kof' || 'ubuntu-latest' }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout git repo
        uses: actions/checkout@v5

      - uses: ./.github/actions/shared-setup
      - uses: ./.github/actions/setup-yq

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Validate version
        run: |
          tag="${{ github.ref_name }}"  # git tag like "v0.2.0"
          version=${tag#v}  # is converted to version like "0.2.0"
          errors=0
          for dir in charts/*
          do
            chart_name=$(yq .name "$dir/Chart.yaml")
            chart_version=$(yq .version "$dir/Chart.yaml")
            chart_app_version=$(yq .appVersion "$dir/Chart.yaml")

            if [ "$chart_version" != "$version" ]; then
              echo "ERROR: $chart_name: Chart.yaml version '$chart_version' does not match tag version '$version'"
              errors=$((errors + 1))
            fi

            if [ "$chart_app_version" != "$version" ]; then
              echo "ERROR: $chart_name: Chart.yaml appVersion '$chart_app_version' does not match tag version '$version'"
              errors=$((errors + 1))
            fi
          done

          if [ "$errors" -gt 0 ]; then
            echo
            echo "Found $errors version mismatch(es). Update Chart.yaml files to match tag '$tag' before releasing."
            exit 1
          fi

          echo "All chart versions match tag version '$version'."

      - name: Build charts
        run: |
          mkdir build
          for dir in charts/*
          do
            yq '.dependencies | filter(.repository | test("^https?://"))
              | map("helm repo add " + .name + " " + .repository)[]' "$dir/Chart.yaml" | sh
            helm dependency update "$dir"

            tag="${{ github.ref_name }}"  # git tag like "v0.2.0"
            version=${tag#v}  # is converted to version like "0.2.0"
            helm package "$dir" --version "$version" --app-version "$version"

            chart_name=$(yq .name "$dir/Chart.yaml")
            mv "$chart_name-$version.tgz" build/
          done
          echo
          echo "Built:"
          ls build

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push charts to GHCR
        run: |
          repo=oci://ghcr.io/${{ github.repository }}/charts
          for chart in build/*
          do
            echo
            echo "Pushing $chart to $repo"
            helm push "$chart" "$repo"
          done
