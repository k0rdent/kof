  resource: kof-mothership-kube-apiserver-availability.rules
  namespace: kof
  source_chart: kof-mothership
- name: code:apiserver_request_total:increase30d
  group: kube-apiserver-availability.rules
  expr: sum by (tenant,cluster, code) (code_verb:apiserver_request_total:increase30d{verb=~"LIST|GET"})
  metrics:
  - code
