- name: apiserver_request:availability30d
  group: kube-apiserver-availability.rules
  expr: 1 - ( ( sum by (tenant,cluster) (cluster_verb_scope:apiserver_request_sli_duration_seconds_count:increase30d{verb=~"POST|PUT|PATCH|DELETE"})
    - sum by (tenant,cluster) (cluster_verb_scope_le:apiserver_request_sli_duration_seconds_bucket:increase30d{verb=~"POST|PUT|PATCH|DELETE",le=~"1(\\.0)?"}
    or vector(0)) ) + ( sum by (tenant,cluster) (cluster_verb_scope:apiserver_request_sli_duration_seconds_count:increase30d{verb=~"LIST|GET"})
    - ( sum by (tenant,cluster) (cluster_verb_scope_le:apiserver_request_sli_duration_seconds_bucket:increase30d{verb=~"LIST|GET",scope=~"resource|",le=~"1(\\.0)?"}
    or vector(0)) + sum by (tenant,cluster) (cluster_verb_scope_le:apiserver_request_sli_duration_seconds_bucket:increase30d{verb=~"LIST|GET",scope="namespace",le=~"5(\\.0)?"}
    or vector(0)) + sum by (tenant,cluster) (cluster_verb_scope_le:apiserver_request_sli_duration_seconds_bucket:increase30d{verb=~"LIST|GET",scope="cluster",le=~"30(\\.0)?"}
    or vector(0)) ) ) + sum by (tenant,cluster) (code:apiserver_request_total:increase30d{code=~"5.."} or vector(0)) ) / sum
    by (tenant,cluster) (code:apiserver_request_total:increase30d)
  metrics:
  - cluster_verb_scope:apiserver_request_sli_duration_seconds_count:increase30d
  - cluster_verb_scope_le:apiserver_request_sli_duration_seconds_bucket:increase30d
  - code:apiserver_request_total:increase30d
  - tenant
  resource: kof-mothership-kube-apiserver-availability.rules
  namespace: kof
  source_chart: kof-mothership
- name: apiserver_request:availability30d
