# This rule is not used by the project kof-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to k0rdent.mirantis.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kof-operator
    app.kubernetes.io/managed-by: kustomize
  name: vmstorageconnection-viewer-role
rules:
- apiGroups:
  - kof.k0rdent.mirantis.com
  resources:
  - vmstorageconnections
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - kof.k0rdent.mirantis.com
  resources:
  - vmstorageconnections/status
  verbs:
  - get
