cert-manager:
  enabled: true
  template: cert-manager-v1-19-3
  cluster-issuer:
    provider: letsencrypt

ingress-nginx:
  enabled: false
  template: ingress-nginx-4-14-3
  values: {}

envoy-gateway:
  enabled: true
  template: gateway-helm-v1-7-2
  values: {}

gateway:
  name: gateway
  namespace: kof

victoria-metrics-operator:
  template: victoria-metrics-operator-0-58-1
  values:
    global:
      cluster:
        dnsDomain: cluster.local
    serviceMonitor:
      enabled: true
      vm: false
    operator:
      disable_prometheus_converter: true
    crds:
      plain: true
      cleanup:
        enabled: false

collectors: {}
storage: {}
operators: {}

istio:
  # -- Installs resources required for the KOF to work properly with the main Istio chart.
  enabled: true

  dependsOn:
    - k0rdent-istio-network
