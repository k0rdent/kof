    node_memory_Cached_bytes{job="node-exporter"} + node_memory_MemFree_bytes{job="node-exporter"} + node_memory_Slab_bytes{job="node-exporter"}
    ) ) / node_memory_MemTotal_bytes{job="node-exporter"} )
  metrics:
