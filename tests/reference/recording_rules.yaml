- 'node_namespace_pod:kube_pod_info:'
- node_network_receive_bytes_total
- node_network_receive_drop_total
- node_network_transmit_bytes_total
- node_network_transmit_drop_total
- node_vmstat_pgmajfault
- owner_name
- replicaset
- scheduler_binding_duration_seconds_bucket
- scheduler_e2e_scheduling_duration_seconds_bucket
- scheduler_scheduling_algorithm_duration_seconds_bucket
- scope
- tenant
- up
- verb
- workload
recording_rules:
- name: node_namespace_pod_container:container_cpu_usage_seconds_total:sum_rate5m
  group: k8s.rules.container_cpu_usage_seconds_total
  expr: sum by (tenant,cluster, namespace, pod, container) ( rate(container_cpu_usage_seconds_total{job="kubelet", metrics_path="/metrics/cadvisor",
    image!=""}[5m]) ) * on (tenant,cluster, namespace, pod) group_left(node) topk by (tenant,cluster, namespace, pod) ( 1,
    max by (tenant,cluster, namespace, pod, node) (kube_pod_info{node!=""}) )
  metrics:
  - container_cpu_usage_seconds_total
  - kube_pod_info
  - tenant
  resource: kof-mothership-k8s.rules.container-cpu-usage-seconds-total
  namespace: kof
  source_chart: kof-mothership
- name: node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate
  group: k8s.rules.container_cpu_usage_seconds_total
  expr: sum by (tenant,cluster, namespace, pod, container) ( irate(container_cpu_usage_seconds_total{job="kubelet", metrics_path="/metrics/cadvisor",
    image!=""}[5m]) ) * on (tenant,cluster, namespace, pod) group_left(node) topk by (tenant,cluster, namespace, pod) ( 1,
    max by (tenant,cluster, namespace, pod, node) (kube_pod_info{node!=""}) )
  metrics:
  - container_cpu_usage_seconds_total
