# This rule is not used by the project kof-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over k0rdent.mirantis.com.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kof-operator
    app.kubernetes.io/managed-by: kustomize
  name: vtstorageconnection-admin-role
rules:
- apiGroups:
  - kof.k0rdent.mirantis.com
  resources:
  - vtstorageconnections
  verbs:
  - '*'
- apiGroups:
  - kof.k0rdent.mirantis.com
  resources:
  - vtstorageconnections/status
  verbs:
  - get
