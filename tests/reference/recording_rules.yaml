    - sum by (tenant,cluster) (cluster_verb_scope_le:apiserver_request_sli_duration_seconds_bucket:increase30d{verb=~"POST|PUT|PATCH|DELETE",le=~"1(\\.0)?"}
    or vector(0)) ) + sum by (tenant,cluster) (code:apiserver_request_total:increase30d{verb="write",code=~"5.."} or vector(0))
    ) / sum by (tenant,cluster) (code:apiserver_request_total:increase30d{verb="write"})
  metrics:
