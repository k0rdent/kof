  namespace: kof
  source_chart: kof-mothership
- name: instance:node_load1_per_cpu:ratio
  group: node-exporter.rules
  expr: ( node_load1{job="node-exporter"} / instance:node_num_cpu:sum{job="node-exporter"} )
  metrics:
  - instance:node_num_cpu:sum
  - node_load1
  resource: kof-mothership-node-exporter.rules
  namespace: kof
  source_chart: kof-mothership
- name: instance:node_memory_utilisation:ratio
  group: node-exporter.rules
