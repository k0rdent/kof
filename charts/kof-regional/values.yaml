# -- Part of the regionless setup managed by the `kof` umbrella chart.
regionless:
  enabled: false
  clusterName: mothership
  domain: mothership.example.com
  certEmail: admin@example.com

# -- When true, all KOF regional clusters are automatically upgraded when the KOF management cluster is upgraded.
# When false, you must manually update the "k0rdent.mirantis.com/kof-version" label on the ClusterDeployment to upgrade it on demand.
autoUpgrade: false

cert-manager:
  enabled: true
  template: cert-manager-v1-19-3
  cluster-issuer:
    provider: letsencrypt

ingress-nginx:
  enabled: false
  template: ingress-nginx-4-14-3
  values: {}

# -- envoy-gateway helm chart.
envoy-gateway:
  enabled: true
  template: gateway-helm-v1-7-2
  values: {}

gateway:
  # -- Enables Gateway API integration.
  enabled: true

  # -- Manage Gateway CR.
  managed: true

  # -- Name of the Gateway CR.
  name: gateway
  namespace: kof

victoria-metrics-operator:
  enabled: true
  template: victoria-metrics-operator-0-58-1
  values:
    global:
      cluster:
        dnsDomain: cluster.local
    serviceMonitor:
      enabled: true
      vm: false
    operator:
      disable_prometheus_converter: true
    crds:
      plain: true
      cleanup:
        enabled: false

kof-operators:
  enabled: true
  values: {}

collectors: {}
storage: {}

istio:
  # -- Installs resources required for the KOF to work properly with the main Istio chart.
  enabled: true

  dependsOn:
    - k0rdent-istio-network
