name: Test Adopted Clusters Upgrade

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
      - release/*
    paths:
      - "charts/**"
      - "kof-operator/**"
      - "scripts/requirements.txt"
      - "tests/live/**"
      - "tests/reference/**"
      - "!**.md"
      - ".github/workflows/pr_test_adopted_upgrade.yml"
jobs:
  latest_releases:
    strategy:
      fail-fast: false
      matrix:
        target: ["kcm", "kof", "istio"]
    name: Get Latest Release
    runs-on: ${{ github.repository_owner == 'k0rdent' && 'kof' || 'ubuntu-latest' }}
    steps:
      - id: release
        uses: pozetroninc/github-action-get-latest-release@master
        with:
          owner: k0rdent
          repo: ${{ matrix.target }}
          excludes: prerelease, draft
      - name: output
        id: output
        run: |
          echo "${{ matrix.target }}=${{ steps.release.outputs.release }}" >> $GITHUB_OUTPUT
    outputs:
      kcm: ${{ steps.output.outputs.kcm }}
      kof: ${{ steps.output.outputs.kof }}
      istio: ${{ steps.output.outputs.istio }}
  deploy:
    defaults:
      run:
        shell: bash --noprofile --norc -euo pipefail {0}
    needs: latest_releases
    strategy:
      fail-fast: false
      matrix:
        target: ["dev", "dev-istio"]
    name: Upgrade KOF
    runs-on: ${{ github.repository_owner == 'k0rdent' && 'kof' || 'ubuntu-latest' }}
    steps:
      - name: "[PR] Checkout"
        uses: actions/checkout@v7
      - name: "[PR] Shared setup"
        uses: ./.github/actions/shared-setup
      - name: "[Latest KOF Release] Checkout"
        uses: actions/checkout@v7
        with:
          repository: k0rdent/kof
          ref: ${{ needs.latest_releases.outputs.kof }}
          fetch-depth: 0
      - name: "[Latest Istio Release] Get chart version"
        if: ${{ matrix.target == 'dev-istio' }}
        id: istio_chart_version
        run: |
          ISTIO_TAG="${{ needs.latest_releases.outputs.istio }}"
          echo "version=${ISTIO_TAG#v}" >> $GITHUB_OUTPUT
      - name: Patch Kind Config
        if: github.repository_owner == 'k0rdent'
        uses: ./.github/actions/kind-config-patch
        with:
          registry-username: ${{ secrets.REGISTRY_CI_USERNAME }}
          registry-password: ${{ secrets.REGISTRY_CI_PASSWORD }}
      - name: "[Latest Release] Install KOF CLI"
        run: |
          make cli-install
      - name: "[Latest KCM Release] Create KIND cluster"
        run: |
          make dev kind-deploy KIND_CONFIG_PATH="$PWD/config/kind.yaml"
      - name: "[Latest KCM Release] Start local registry"
        run: |
          make registry-deploy
      - name: "[Latest KCM Release] Get chart version"
        id: kcm_chart_version
        run: |
          KCM_TAG="${{ needs.latest_releases.outputs.kcm }}"
          echo "version=${KCM_TAG#v}" >> $GITHUB_OUTPUT
      - name: "[Latest KCM Release] Install Envoy Gateway"
        run: |
          helm upgrade --install envoy-gateway oci://docker.io/envoyproxy/gateway-helm \
            --version v1.7.2 \
            -n envoy-gateway-system \
            --create-namespace \
            --wait \
            --timeout 10m
      - name: "[Latest KCM Release] Install KCM from release chart"
        run: |
          helm install kcm oci://ghcr.io/k0rdent/kcm/staging/kcm \
            --version ${{ steps.kcm_chart_version.outputs.version }} \
            --set regional.cert-manager.config.enableGatewayAPI=true \
            --set controller.templatesRepoURL="oci://ghcr.io/k0rdent/kcm/staging" \
            -n kcm-system \
            --create-namespace \
            --wait \
            --timeout 10m
      - name: "[Latest KCM Release] Wait for mgmt/kcm"
        run: |
          kubectl wait --for create mgmt/kcm --timeout=1m
          kubectl patch mgmt/kcm --type='json' -p '[{"op": "replace", "path": "/spec/providers", "value":[{"name":"projectsveltos"}]}]'
          kubectl wait --for=condition=Ready mgmt/kcm --timeout=10m
      - name: "[Latest Istio Release] Install Istio from release chart"
        if: ${{ matrix.target == 'dev-istio' }}
        run: |
          kubectl wait --for create crd/clusterprofiles.config.projectsveltos.io --timeout=5m
          kubectl create namespace kof
          kubectl label namespace kof istio-injection=enabled
          helm install k0rdent-istio oci://ghcr.io/k0rdent/istio/charts/k0rdent-istio \
            --version ${{ steps.istio_chart_version.outputs.version }} \
            -n istio-system \
            --create-namespace \
            --wait \
            --timeout 10m \
            --set cert-manager.enable=false
      - name: "[Latest KOF Release] Install KOF from release chart"
        run: |
          KOF_TAG="${{ needs.latest_releases.outputs.kof }}"
          helm install kof oci://ghcr.io/k0rdent/kof/charts/kof \
            --version "${KOF_TAG#v}" \
            -n kof \
            --create-namespace \
            --timeout 10m
          kubectl wait --for=condition=Ready helmreleases --all -n kof --timeout=10m
      - name: "[Latest KOF Release] Cleanup kind clusters if any"
        run: |
          make dev-adopted-rm KIND_CLUSTER_NAME=child-adopted
          make dev-adopted-rm KIND_CLUSTER_NAME=regional-adopted
      - name: "[Latest KOF Release] Pull otel-collector image"
        run: |
          docker pull "ghcr.io/k0rdent/kof/kof-opentelemetry-collector-contrib:${{ needs.latest_releases.outputs.kof }}"

      - name: "[Latest KOF Release] Run KIND kof Regional cluster"
        run: |
          make dev-adopted-deploy KIND_CLUSTER_NAME=regional-adopted KIND_CONFIG_PATH=$PWD/config/kind.yaml
      - name: Run KIND cloud provider
        run: docker run -d --rm --network kind -v /var/run/docker.sock:/var/run/docker.sock registry.k8s.io/cloud-provider-kind/cloud-controller-manager:v0.10.0
      - name: "[Latest KOF Release] Deploy KOF components on adopted Regional cluster"
        run: |
          make ${{ matrix.target }}-regional-deploy-adopted

      - name: "[Latest KOF Release] Run KIND KOF Child cluster"
        run: |
          make dev-adopted-deploy KIND_CLUSTER_NAME=child-adopted KIND_CONFIG_PATH=$PWD/config/kind.yaml
      - name: "[Latest KOF Release] Configure CoreDNS hosts on Child cluster"
        if: ${{ matrix.target == 'dev' }}
        run: |
          make dev-coredns
      - name: "[Latest KOF Release] Deploy KOF components on adopted Child cluster"
        run: |
          make ${{ matrix.target }}-child-deploy-adopted

      - name: Fetch PR Ref and Checkout Repo
        uses: ./.github/actions/fetch-pr-ref
      - uses: ./.github/actions/setup-yq
      - name: "[Main KCM Branch] Get latest successful KCM CI SHA"
        id: main-kcm-ci
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA=$(gh run list --repo k0rdent/kcm --workflow build-staging.yaml \
            --branch "$KCM_RELEASE" --status success --limit 1 \
            --json headSha --jq '.[0].headSha // empty')
          [ -n "$SHA" ] || { echo "::error::No successful KCM CI runs for $KCM_RELEASE"; exit 1; }
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
      - name: "[Main KCM Branch] Checkout KCM repository"
        uses: actions/checkout@v7
        with:
          repository: k0rdent/kcm
          ref: ${{ steps.main-kcm-ci.outputs.sha }}
          path: kcm-repo
          fetch-depth: 0
      - name: "[Main KCM Branch] Get CI chart version"
        id: main-kcm-chart-version
        run: |
          KCM_VERSION="$(git -C kcm-repo describe --tags --always)"
          KCM_VERSION="${KCM_VERSION#v}"
          echo "version=$KCM_VERSION" >> "$GITHUB_OUTPUT"
      - name: "[Main KCM Branch] Upgrade KCM"
        run: |
          KCM_VERSION="${{ steps.main-kcm-chart-version.outputs.version }}"
          KCM_RELEASE="kcm-${KCM_VERSION//./-}"
          export KCM_RELEASE KCM_VERSION

          curl -sSL "https://raw.githubusercontent.com/k0rdent/kcm/refs/tags/v${KCM_VERSION}/templates/provider/kcm-templates/files/release.yaml" > release.yaml
          yq eval -i '.metadata.name = env(KCM_RELEASE) | .spec.version = env(KCM_VERSION) | .spec.kcm.template = env(KCM_RELEASE)' release.yaml

          kubectl apply -f release.yaml

          kubectl wait --for=create "release/$KCM_RELEASE" --timeout=5m
          kubectl wait "release/$KCM_RELEASE" \
            --for='jsonpath={.status.ready}=true' \
            --timeout=10m

          kubectl patch mgmt/kcm --type=merge \
            -p "{\"spec\":{\"release\":\"$KCM_RELEASE\",\"providers\":[{\"name\":\"projectsveltos\"}]}}"
          kubectl wait mgmt/kcm \
            --for="jsonpath={.status.release}=$KCM_RELEASE" \
            --timeout=10m
          kubectl wait --for=condition=Ready mgmt/kcm --timeout=10m

      # NOTE: This step is not needed while we have the same "adopted-cluster-1-0-2"
      # both in [Latest KCM Release] and [Main KCM Branch] but we may need it later:
      #
      # - name: Create ClusterTemplateChains for adopted-cluster template
      #   run: |
      #     kubectl apply -f - <<EOF
      #     apiVersion: k0rdent.mirantis.com/v1beta1
      #     kind: ClusterTemplateChain
      #     metadata:
      #       name: adopted-cluster-chain
      #       namespace: kcm-system
      #     spec:
      #       supportedTemplates:
      #       - name: adopted-cluster-1-0-1
      #         availableUpgrades:
      #         - name: adopted-cluster-1-0-2
      #           version: 1.0.2
      #       - name: adopted-cluster-1-0-2
      #     EOF

      - name: Patch AccessManagement to allow cluster upgrade
        run: |
          kubectl get accessmanagement kcm -o json \
            | jq '.spec.accessRules += [{"clusterTemplateChains":["adopted-cluster-chain"],"targetNamespaces":{"list":["kcm-system"]}}]' \
            | kubectl apply -f -
      - name: "[PR] Install KOF CLI"
        run: |
          make cli-install
      - name: "[PR] Push KOF Helm Charts"
        run: |
          make helm-push
      - name: "[Main Istio Branch] Get latest successful Istio CI SHA"
        if: ${{ matrix.target == 'dev-istio' }}
        id: main-istio-ci
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA=$(gh run list --repo k0rdent/istio --workflow test_build.yml \
            --branch "$ISTIO_RELEASE" --status success --limit 1 \
            --json headSha --jq '.[0].headSha // empty')
          [ -n "$SHA" ] || { echo "::error::No successful Istio CI runs for $ISTIO_RELEASE"; exit 1; }
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
      - name: "[Main Istio Branch] Checkout"
        if: ${{ matrix.target == 'dev-istio' }}
        uses: actions/checkout@v7
        with:
          repository: k0rdent/istio
          ref: ${{ steps.main-istio-ci.outputs.sha }}
          path: istio-repo
          fetch-depth: 0
      - name: "[Main Istio Branch] Get CI chart version"
        if: ${{ matrix.target == 'dev-istio' }}
        id: main-istio-chart-version
        run: |
          ISTIO_VERSION="$(git -C istio-repo describe --tags --always)"
          echo "version=$ISTIO_VERSION" >> "$GITHUB_OUTPUT"
      - name: "[Main Istio Branch] Upgrade Istio"
        if: ${{ matrix.target == 'dev-istio' }}
        run: |
          helm upgrade k0rdent-istio oci://ghcr.io/k0rdent/istio/charts/k0rdent-istio \
            --version "${{ steps.main-istio-chart-version.outputs.version }}" \
            --set operator.image.tag="${{ steps.main-istio-chart-version.outputs.version }}" \
            -n istio-system \
            --wait \
            --timeout 10m \
            --set cert-manager.enable=false
      - name: "[Main Branch] Setup Go"
        uses: actions/setup-go@v6
        with:
          go-version-file: kof-operator/go.mod
          cache: false
      - name: "[PR] Deploy KOF components on Mothership cluster"
        run: |
          make dev-deploy M2R=regional-adopted
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install -r scripts/requirements.txt
      - name: "[PR] Grafana gateway smoke test"
        run: |
          make dev-grafana-smoke
      - name: "[PR] Run KIND kof Regional cluster"
        run: |
          make dev-adopted-deploy KIND_CLUSTER_NAME=regional-adopted KIND_CONFIG_PATH=$PWD/config/kind.yaml
      - name: "[PR] Run KIND kof Child cluster"
        run: |
          make dev-adopted-deploy KIND_CLUSTER_NAME=child-adopted KIND_CONFIG_PATH=$PWD/config/kind.yaml

      - name: "[PR] Deploy KOF components on adopted Regional cluster"
        run: |
          make ${{ matrix.target }}-regional-deploy-adopted
      - name: "[PR] Deploy KOF components on adopted Child cluster"
        run: |
          make ${{ matrix.target }}-child-deploy-adopted
      - name: "[PR] Configure CoreDNS hosts on Child cluster"
        if: ${{ matrix.target == 'dev' }}
        run: |
          make dev-coredns
      - name: Waiting 10m for metrics collection
        run: sleep 10m
      - name: Waiting for KOF ServiceSets
        if: ${{ matrix.target == 'dev-istio' }}
        run: |
          kubectl wait --for=condition=ServicesInReadyState \
            servicesets.k0rdent.mirantis.com -n kcm-system --all --timeout=20m
      - run: make dev-grafana-port-forward
      - name: Checking all collectors are up and running
        run: |
          KUBECTL_CONTEXT=kind-regional-adopted make wait-otel-collectors
          KUBECTL_CONTEXT=kind-child-adopted make wait-otel-collectors
      - name: Checking metrics
        run: python -m pytest scripts/metrics_smoke_test.py -v
      - name: Checking Grafana dashboards and queries
        run: python -m pytest -c tests/live/pytest.ini tests/live -qq --tb=short
      # TODO: Enable audit logs check once the upgrade workflow deploys clusters with audit logs enabled
      # - name: Checking audit logs
      #   run: python -m pytest scripts/audit_logs_smoke_test.py -v --log-cli-level=INFO
      - name: Report KOF pod restarts
        if: ${{ failure() }}
        run: |
          make report-kof-pod-restarts
          make report-kof-pod-restarts KUBECTL_CONTEXT=kind-regional-adopted
          make report-kof-pod-restarts KUBECTL_CONTEXT=kind-child-adopted
      - name: Make support-bundle
        if: ${{ failure() }}
        run: |
          make support-bundle
          make support-bundle KUBECTL_CONTEXT=kind-regional-adopted
          make support-bundle KUBECTL_CONTEXT=kind-child-adopted
      - name: Archive support-bundle
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}-support-bundles.tar.gz
          path: ./support-bundle-*.tar.gz
