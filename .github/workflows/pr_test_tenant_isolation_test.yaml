name: Test Tenant Isolation on Adopted Clusters

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
      - release/*
    paths:
      - "charts/**"
      - "!**.md"
      - ".github/workflows/pr_test_tenant_isolation_test.yaml"

jobs:
  deploy:
    strategy:
      fail-fast: false
      matrix:
        target: ["dev", "dev-istio"]
    name: Install KOF
    runs-on: ${{ github.repository_owner == 'k0rdent' && 'kof' || 'ubuntu-latest' }}
    steps:
      - name: "[PR] Checkout"
        uses: actions/checkout@v6
      - name: "[PR] Shared setup"
        uses: ./.github/actions/shared-setup
      - name: "[PR] Setup Go"
        uses: actions/setup-go@v6
        with:
          go-version-file: kof-operator/go.mod
          cache: false
      - name: "[Latest KCM Release] Get version"
        id: kcm_release
        uses: pozetroninc/github-action-get-latest-release@master
        with:
          owner: k0rdent
          repo: kcm
          excludes: prerelease, draft
      - name: "[PR] Install KOF CLI"
        run: |
          make cli-install
      - name: Patch Kind Config
        if: github.repository_owner == 'k0rdent'
        uses: ./.github/actions/kind-config-patch
        with:
          registry-username: ${{ secrets.REGISTRY_CI_USERNAME }}
          registry-password: ${{ secrets.REGISTRY_CI_PASSWORD }}
      - name: "[Latest KCM Release] Create KIND cluster"
        run: |
          make dev kind-deploy KIND_CONFIG_PATH="$PWD/config/kind.yaml"
      - name: "[Latest KCM Release] Start local registry"
        run: |
          make registry-deploy
      - name: "[Latest KCM Release] Install Envoy Gateway"
        run: |
          helm upgrade --install envoy-gateway oci://docker.io/envoyproxy/gateway-helm \
            --version v1.7.2 \
            -n envoy-gateway-system \
            --create-namespace \
            --wait \
            --timeout 10m
      - name: "[Latest KCM Release] Install KCM from release chart"
        run: |
          KCM_TAG="${{ steps.kcm_release.outputs.release }}"
          helm install kcm oci://ghcr.io/k0rdent/kcm/charts/kcm \
            --version "${KCM_TAG#v}" \
            --set regional.cert-manager.config.enableGatewayAPI=true \
            -n kcm-system \
            --create-namespace \
            --wait \
            --timeout 10m
      - name: "[Latest KCM Release] Wait for mgmt/kcm"
        run: |
          kubectl wait --for create mgmt/kcm --timeout=1m
          kubectl patch mgmt/kcm --type='json' -p '[{"op": "replace", "path": "/spec/providers", "value":[{"name":"projectsveltos"}]}]'
          kubectl wait --for=condition=Ready mgmt/kcm --timeout=10m
      - name: "[Main Branch] Get latest successful Istio CI SHA"
        if: ${{ matrix.target == 'dev-istio' }}
        id: istio-ci
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA=$(gh run list --repo k0rdent/istio --workflow test_build.yml \
            --branch "$ISTIO_RELEASE" --status success --limit 1 \
            --json headSha --jq '.[0].headSha // empty')
          [ -n "$SHA" ] || { echo "::error::No successful Istio CI runs for $ISTIO_RELEASE"; exit 1; }
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
      - name: "[Main Branch] Checkout Istio repository"
        if: ${{ matrix.target == 'dev-istio' }}
        uses: actions/checkout@v6
        with:
          repository: k0rdent/istio
          ref: ${{ steps.istio-ci.outputs.sha }}
          path: istio-repo
          fetch-depth: 0
      - name: "[Main Branch] Get Istio CI chart version"
        if: ${{ matrix.target == 'dev-istio' }}
        id: istio-chart-version
        run: |
          ISTIO_VERSION="$(git -C istio-repo describe --tags --always)"
          echo "version=$ISTIO_VERSION" >> "$GITHUB_OUTPUT"

      - name: "Create namespace and add injection label"
        if: ${{ matrix.target == 'dev-istio' }}
        run: |
          kubectl create namespace kof
          kubectl label namespace kof istio-injection=enabled

      - name: "[Main Branch] Install k0rdent-istio from CI chart"
        if: ${{ matrix.target == 'dev-istio' }}
        run: |
          helm install k0rdent-istio oci://ghcr.io/k0rdent/istio/charts/k0rdent-istio \
            --version "${{ steps.istio-chart-version.outputs.version }}" \
            --set operator.image.tag="${{ steps.istio-chart-version.outputs.version }}" \
            -n istio-system \
            --create-namespace \
            --wait \
            --timeout 10m \
            --set cert-manager.enable=false \
            --set "istiod.meshConfig.extensionProviders[0].name=otel-tracing" \
            --set "istiod.meshConfig.extensionProviders[0].opentelemetry.port=4317" \
            --set "istiod.meshConfig.extensionProviders[0].opentelemetry.service=kof-collectors-daemon-collector.kof.svc.cluster.local" \
            --set-json 'gateway.resource.spec.servers[0]={"port":{"number":15443,"name":"tls","protocol":"TLS"},"tls":{"mode":"AUTO_PASSTHROUGH"},"hosts":["{clusterName}-vmauth.kof.svc.cluster.local"]}'
      - name: "[PR] Push KOF Helm Charts"
        run: |
          make helm-push
      - name: Run KIND cloud provider
        run: docker run -d --rm --network kind -v /var/run/docker.sock:/var/run/docker.sock registry.k8s.io/cloud-provider-kind/cloud-controller-manager:v0.10.0 --gateway-channel="disabled"
      - name: "[PR] Deploy KOF components on Mothership cluster"
        run: |
          make dev-deploy M2M=true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install -r scripts/requirements.txt
      - name: "[PR] Grafana gateway smoke test"
        run: |
          make dev-grafana-smoke
      - name: "[PR] Run KIND kof Regional cluster"
        run: |
          make dev-adopted-deploy KIND_CLUSTER_NAME=regional-adopted KIND_CONFIG_PATH=$PWD/config/kind.yaml
      - name: "[PR] Deploy KOF components on adopted Regional cluster"
        run: |
          make ${{ matrix.target }}-regional-deploy-adopted
      - name: "[PR] Run KIND kof Child cluster"
        run: |
          make dev-adopted-deploy KIND_CLUSTER_NAME=child-adopted KIND_CONFIG_PATH=$PWD/config/kind.yaml
      - name: "[PR] Configure CoreDNS hosts on Child cluster"
        if: ${{ matrix.target == 'dev' }}
        run: |
          make dev-coredns
      - name: "[PR] Deploy KOF components on adopted Child cluster"
        run: |
          make ${{ matrix.target }}-child-deploy-adopted

      - name: "Verify default PLATFORM tenant label on unlabeled child cluster"
        run: |
          # Wait for the VMUser to be created by the operator (no kof-tenant-id label set yet)
          kubectl wait --for=create vmuser -n kcm-system -l k0rdent.mirantis.com/kof-cluster-name=child-adopted --timeout=5m
          # The operator writes tenant into spec.targetRefs[*].query_args; check that tenant=PLATFORM is present
          QUERY_ARG_VALUES=$(kubectl get vmuser -n kcm-system -l k0rdent.mirantis.com/kof-cluster-name=child-adopted \
            -o jsonpath='{.items[0].spec.targetRefs[*].query_args[*].values[*]}')
          echo "VMUser query_args values: $QUERY_ARG_VALUES"
          echo "$QUERY_ARG_VALUES" | grep -q "tenant=PLATFORM" || \
            { echo "❌ Expected default tenant label 'tenant=PLATFORM' not found in VMUser query_args"; exit 1; }

      - name: "Label child cluster with explicit tenant and verify VMUser update"
        run: |
          kubectl label cld -n kcm-system child-adopted k0rdent.mirantis.com/kof-tenant-id=child-tenant-a
          # Wait for the operator to reconcile and update the VMUser queryArgs with the explicit tenant
          DEADLINE=$((SECONDS + 120))
          until QUERY_ARG_VALUES=$(kubectl get vmuser -n kcm-system -l k0rdent.mirantis.com/kof-cluster-name=child-adopted \
            -o jsonpath='{.items[0].spec.targetRefs[*].query_args[*].values[*]}') && \
            echo "$QUERY_ARG_VALUES" | grep -q "tenant=child-tenant-a"; do
            [ $SECONDS -lt $DEADLINE ] || { echo "❌ VMUser was not updated to tenant=child-tenant-a in time"; exit 1; }
            echo "  waiting for VMUser to reflect child-tenant-a..."; sleep 5
          done
          echo "✅ VMUser updated to tenant=child-tenant-a"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
      - run: pip install -r scripts/requirements.txt
      - name: Waiting 10m for metrics collection
        run: sleep 10m
      - run: make dev-grafana-port-forward
      - name: Verify tenant isolation labels in metrics
        run: CHILD_LABELS='tenant="child-tenant-a"' python -m pytest scripts/metrics_smoke_test.py -v
      - name: Checking audit logs
        run: python -m pytest scripts/audit_logs_smoke_test.py -v --log-cli-level=INFO
      - name: Get child kubeconfig
        run: |
          kind get kubeconfig --name="child-adopted" > /tmp/child-kubeconfig
          echo "CHILD_KUBECONFIG=/tmp/child-kubeconfig" >> $GITHUB_ENV
      - name: Find VMUser secrets name [Child Cluster]
        run: |
          SECRET_NAME=$(kubectl --kubeconfig="$CHILD_KUBECONFIG" get secret -n kof -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' | grep vmuser | head -n 1)
          echo "VMUSER_SECRET=$SECRET_NAME" >> $GITHUB_ENV
      - name: Get VMUser credentials [Child Cluster]
        run: |
          USERNAME=$(kubectl --kubeconfig="$CHILD_KUBECONFIG" get secret $VMUSER_SECRET -n kof -o jsonpath='{.data.username}' | base64 --decode)
          PASSWORD=$(kubectl --kubeconfig="$CHILD_KUBECONFIG" get secret $VMUSER_SECRET -n kof -o jsonpath='{.data.password}' | base64 --decode)
          echo "VMUSER_USERNAME=$USERNAME" >> $GITHUB_ENV
          echo "VMUSER_PASSWORD=$PASSWORD" >> $GITHUB_ENV
      - name: Creating curl pod [Child Cluster]
        run: |
          kubectl --kubeconfig="$CHILD_KUBECONFIG" run curl --image=curlimages/curl --restart=Never -n kof -- sleep infinity
          kubectl --kubeconfig="$CHILD_KUBECONFIG" wait --for=condition=Ready pod/curl -n kof --timeout=60s
      - name: Set VMAuth endpoint
        run: |
          if [ "${{ matrix.target }}" == "dev-istio" ]; then
            echo "VMAUTH_ENDPOINT=http://regional-adopted-vmauth:8427/vm/insert/0/prometheus/api/v1/write" >> $GITHUB_ENV
          else
            echo "VMAUTH_ENDPOINT=https://vmauth.adopted-cluster-regional/vm/select/0/prometheus/api/v1/query" >> $GITHUB_ENV
          fi
      - name: Verify that the tenant cluster can only see its own metrics [Child Cluster]
        run: |
          RESPONSE=$(kubectl --kubeconfig="$CHILD_KUBECONFIG" exec curl -n kof -- curl -s -k -u "$VMUSER_USERNAME:$VMUSER_PASSWORD" -G "$VMAUTH_ENDPOINT" \
            --data-urlencode 'query=up{job=~"kubernetes-apiservers|apiserver"}')

          NO_TENANT=$(echo "$RESPONSE" | jq -r '.data.result[] | select(.metric.tenant == null) | .metric')
          [ -z "$NO_TENANT" ] || { echo "❌ Found metrics WITHOUT tenant label:"; echo "$NO_TENANT"; exit 1; }

          WRONG_TENANT=$(echo "$RESPONSE" | jq -r '.data.result[] | select(.metric.tenant != "child-tenant-a") | .metric')
          [ -z "$WRONG_TENANT" ] || { echo "❌ Found metrics with incorrect tenant:"; echo "$WRONG_TENANT"; exit 1; }

      - name: Make support-bundle
        if: ${{ failure() }}
        run: |
          make support-bundle
          make support-bundle KUBECTL_CONTEXT=kind-regional-adopted
          make support-bundle KUBECTL_CONTEXT=kind-child-adopted
      - name: Archive support-bundle
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}-support-bundles.tar.gz
          path: ./support-bundle-*.tar.gz
