    owner_kind="ReplicaSet"}, "replicaset", "$1", "owner_name", "(.*)" ) * on (tenant,replicaset, namespace) group_left(owner_name)
    topk by (tenant,replicaset, namespace) ( 1, max by (tenant,replicaset, namespace, owner_name) ( kube_replicaset_owner{job="kube-state-metrics"}
    ) ), "workload", "$1", "owner_name", "(.*)" ) )
  metrics:
  - kube_pod_owner
  - kube_replicaset_owner
  - owner_name
  - replicaset
  - tenant
  - workload
