{{- if .Values.victoriametrics.enabled }}
{{- if .Values.victoriametrics.vmauth.enabled }}
{{- if .Values.victoriametrics.vmauth.vmuser.enabled }}
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMUser
metadata:
  name: vmuser-select-admin
  namespace: {{ .Release.Namespace }}
spec:
  targetRefs:
  - drop_src_path_prefix_parts: 1
    paths:
    - /vls/.*
    static:
      url: {{ include "kof-storage.vlSelectLocalUrl" . }}
  - drop_src_path_prefix_parts: 1
    paths:
    - /vli/.*
    static:
      url: {{ include "kof-storage.vlInsertLocalUrl" . }}
  - drop_src_path_prefix_parts: 1
    paths:
    - /vm/select/.*
    static:
      url: {{ include "kof-storage.vmSelectLocalUrl" . }}
  - drop_src_path_prefix_parts: 1
    paths:
    - /vm/insert/.*
    static:
      url: {{ include "kof-storage.vmInsertLocalUrl" . }}
{{- if .Values.victoriametrics.vlcluster_audit.enabled }}
  - drop_src_path_prefix_parts: 1
    paths:
    - /vlas/.*
    static:
      url: {{ include "kof-storage.vlAuditSelectLocalUrl" . }}
  - drop_src_path_prefix_parts: 1
    paths:
    - /vlai/.*
    static:
      url: {{ include "kof-storage.vlAuditInsertLocalUrl" . }}
{{- end }}
  - drop_src_path_prefix_parts: 1
    paths:
    - /vts/.*
    static:
      url: {{ include "kof-storage.vtSelectLocalUrl" . }}
  - drop_src_path_prefix_parts: 1
    paths:
    - /vti/.*
    static:
      url: {{ include "kof-storage.vtInsertLocalUrl" . }}
{{- $secret := (lookup "v1" "Secret" .Release.Namespace .Values.victoriametrics.vmauth.vmuser.credentials.credentials_secret_name) }}
{{- if not $.Values.global.lint }}
  username: {{ index $secret.data .Values.victoriametrics.vmauth.vmuser.credentials.username_key | b64dec | quote }}
{{- end }}
  passwordRef:
    key: {{ .Values.victoriametrics.vmauth.vmuser.credentials.password_key }}
    name: {{ .Values.victoriametrics.vmauth.vmuser.credentials.credentials_secret_name }}
{{- end }}
{{- end }}
{{- end }}
