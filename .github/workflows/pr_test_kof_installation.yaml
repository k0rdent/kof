name: Test KOF Installation on Adopted Clusters

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
      - release/*
    paths:
      - "charts/**"
      - "kof-operator/**"
      - "scripts/requirements.txt"
      - "tests/live/**"
      - "tests/reference/**"
      - "!**.md"
      - ".github/workflows/pr_test_kof_installation.yaml"

jobs:
  deploy:
    defaults:
      run:
        shell: bash --noprofile --norc -euo pipefail {0}
    strategy:
      fail-fast: false
      matrix:
        target: ["dev", "dev-istio", "dev-regionless"]
    name: Install KOF
    runs-on: ${{ github.repository_owner == 'k0rdent' && 'kof' || 'ubuntu-latest' }}
    steps:
      - name: "[PR] Checkout"
        uses: actions/checkout@v6
      - name: "[PR] Shared setup"
        uses: ./.github/actions/shared-setup
      - name: "[PR] Setup Go"
        uses: actions/setup-go@v6
        with:
          go-version-file: kof-operator/go.mod
          cache: false
      - name: "[Latest KCM Release] Get version"
        id: kcm_release
        uses: pozetroninc/github-action-get-latest-release@master
        with:
          owner: k0rdent
          repo: kcm
          excludes: prerelease, draft
      - name: "[PR] Install KOF CLI"
        run: |
          make cli-install
      - name: Patch Kind Config
        if: github.repository_owner == 'k0rdent'
        uses: ./.github/actions/kind-config-patch
        with:
          registry-username: ${{ secrets.REGISTRY_CI_USERNAME }}
          registry-password: ${{ secrets.REGISTRY_CI_PASSWORD }}
      - name: "[Latest KCM Release] Create KIND cluster"
        run: |
          make dev kind-deploy KIND_CONFIG_PATH="$PWD/config/kind.yaml"
      - name: "[Latest KCM Release] Start local registry"
        run: |
          make registry-deploy
      - name: "[Latest KCM Release] Install Envoy Gateway"
        run: |
          helm upgrade --install envoy-gateway oci://docker.io/envoyproxy/gateway-helm \
            --version v1.7.2 \
            -n envoy-gateway-system \
            --create-namespace \
            --wait \
            --timeout 10m
      - name: "[Latest KCM Release] Install KCM from release chart"
        run: |
          KCM_TAG="${{ steps.kcm_release.outputs.release }}"
          helm install kcm oci://ghcr.io/k0rdent/kcm/charts/kcm \
            --version "${KCM_TAG#v}" \
            --set regional.cert-manager.config.enableGatewayAPI=true \
            -n kcm-system \
            --create-namespace \
            --wait \
            --timeout 10m
      - name: "[Latest KCM Release] Wait for mgmt/kcm"
        run: |
          kubectl wait --for create mgmt/kcm --timeout=1m
          kubectl patch mgmt/kcm --type='json' -p '[{"op": "replace", "path": "/spec/providers", "value":[{"name":"projectsveltos"}]}]'
          kubectl wait --for=condition=Ready mgmt/kcm --timeout=10m
      - name: "[Main Branch] Get latest successful Istio CI SHA"
        if: ${{ matrix.target == 'dev-istio' }}
        id: istio-ci
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA=$(gh run list --repo k0rdent/istio --workflow test_build.yml \
            --branch "$ISTIO_RELEASE" --status success --limit 1 \
            --json headSha --jq '.[0].headSha // empty')
          [ -n "$SHA" ] || { echo "::error::No successful Istio CI runs for $ISTIO_RELEASE"; exit 1; }
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
      - name: "[Main Branch] Checkout Istio repository"
        if: ${{ matrix.target == 'dev-istio' }}
        uses: actions/checkout@v6
        with:
          repository: k0rdent/istio
          ref: ${{ steps.istio-ci.outputs.sha }}
          path: istio-repo
          fetch-depth: 0
      - name: "[Main Branch] Get Istio CI chart version"
        if: ${{ matrix.target == 'dev-istio' }}
        id: istio-chart-version
        run: |
          ISTIO_VERSION="$(git -C istio-repo describe --tags --always)"
          echo "version=$ISTIO_VERSION" >> "$GITHUB_OUTPUT"

      - name: "Create namespace and add injection label"
        if: ${{ matrix.target == 'dev-istio' }}
        run: |
          kubectl create namespace kof
          kubectl label namespace kof istio-injection=enabled

      - name: "[Main Branch] Install k0rdent-istio from CI chart"
        if: ${{ matrix.target == 'dev-istio' }}
        run: |
          helm install k0rdent-istio oci://ghcr.io/k0rdent/istio/charts/k0rdent-istio \
            --version "${{ steps.istio-chart-version.outputs.version }}" \
            --set operator.image.tag="${{ steps.istio-chart-version.outputs.version }}" \
            -n istio-system \
            --create-namespace \
            --wait \
            --timeout 10m \
            --set injectionNamespaces={kof} \
            --set cert-manager.enable=false \
            --set "istiod.meshConfig.extensionProviders[0].name=otel-tracing" \
            --set "istiod.meshConfig.extensionProviders[0].opentelemetry.port=4317" \
            --set "istiod.meshConfig.extensionProviders[0].opentelemetry.service=kof-collectors-daemon-collector.kof.svc.cluster.local" \
            --set-json 'gateway.resource.spec.servers[0]={"port":{"number":15443,"name":"tls","protocol":"TLS"},"tls":{"mode":"AUTO_PASSTHROUGH"},"hosts":["{clusterName}-vmauth.kof.svc.cluster.local"]}'
      - name: "[PR] Push KOF Helm Charts"
        run: |
          make helm-push
      - name: Run KIND cloud provider
        run: docker run -d --rm --network kind -v /var/run/docker.sock:/var/run/docker.sock registry.k8s.io/cloud-provider-kind/cloud-controller-manager:v0.10.0 --gateway-channel="disabled"
      - name: "[PR] Deploy KOF components on Mothership cluster"
        if: ${{ matrix.target != 'dev-regionless' }}
        run: |
          make dev-deploy M2M=true
      - name: "[PR] Deploy KOF regionless components on Mothership cluster"
        if: ${{ matrix.target == 'dev-regionless' }}
        run: |
          make dev-deploy REGIONLESS=true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install -r scripts/requirements.txt
      - name: "[PR] Grafana gateway smoke test"
        if: ${{ matrix.target != 'dev-regionless' }}
        # Regionless disables kof-mothership Gateway
        # used by kof-mothership Grafana in this test,
        # in favor of Gateway from kof-storage for vmauth.
        run: |
          make dev-grafana-smoke
      - name: "[PR] Run KIND kof Regional cluster"
        if: ${{ matrix.target != 'dev-regionless' }}
        run: |
          make dev-adopted-deploy KIND_CLUSTER_NAME=regional-adopted KIND_CONFIG_PATH=$PWD/config/kind.yaml
      - name: "[PR] Deploy KOF components on adopted Regional cluster"
        if: ${{ matrix.target != 'dev-regionless' }}
        run: |
          make ${{ matrix.target }}-regional-deploy-adopted
      - name: "[PR] Run KIND kof Child cluster"
        run: |
          make dev-adopted-deploy KIND_CLUSTER_NAME=child-adopted KIND_CONFIG_PATH=$PWD/config/kind.yaml
      - name: "[PR] Configure CoreDNS hosts on Child cluster"
        if: ${{ matrix.target != 'dev-istio' }}
        run: |
          make dev-coredns
      - name: "[PR] Deploy KOF components on adopted Child cluster"
        if: ${{ matrix.target != 'dev-regionless' }}
        run: |
          make ${{ matrix.target }}-child-deploy-adopted
      - name: "[PR] Deploy KOF regionless components on adopted Child cluster"
        if: ${{ matrix.target == 'dev-regionless' }}
        run: |
          make dev-child-deploy-adopted
      - name: Waiting 10m for metrics collection
        run: sleep 10m
      - run: make dev-grafana-port-forward
      - name: Checking all collectors are up and running
        run: |
          if [ "${{ matrix.target }}" != "dev-regionless" ]; then
            KUBECTL_CONTEXT=kind-regional-adopted make wait-otel-collectors
          fi
          KUBECTL_CONTEXT=kind-child-adopted make wait-otel-collectors
      - name: Checking metrics
        env:
          REGIONLESS: ${{ matrix.target == 'dev-regionless' }}
        run: python -m pytest scripts/metrics_smoke_test.py -v
      - name: Checking Grafana dashboards and queries
        run: python -m pytest -c tests/live/pytest.ini tests/live -v --log-cli-level=INFO
      - name: Checking audit logs
        env:
          REGIONLESS: ${{ matrix.target == 'dev-regionless' }}
        run: python -m pytest scripts/audit_logs_smoke_test.py -v --log-cli-level=INFO
      - name: Make support-bundle
        if: ${{ failure() }}
        run: |
          make support-bundle
          if [ "${{ matrix.target }}" != "dev-regionless" ]; then
            make support-bundle KUBECTL_CONTEXT=kind-regional-adopted
          fi
          make support-bundle KUBECTL_CONTEXT=kind-child-adopted
      - name: Archive support-bundle
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}-support-bundles.tar.gz
          path: ./support-bundle-*.tar.gz
