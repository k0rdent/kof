{{- if .Values.grafana.enabled }}
{{- $vmc := index .Values "victoria-metrics-multilevel-select" }}
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: {{ .Release.Name }}-metrics
  namespace: {{ .Release.Namespace }}
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasource:
    name: kof-metrics
    type: prometheus
    access: proxy
    {{- if .Values.kcm.kof.acl.enabled }}
    url: http://{{ .Release.Name }}-kof-acl:{{ .Values.kcm.kof.acl.port }}/metrics
    {{- else if $vmc.enabled }}
    url: http://vmselect-{{ .Release.Name }}-metrics-multilevel-select.{{ .Release.Namespace }}.svc:{{ $vmc.port }}/select/0/prometheus
    {{- else }}
    url: http://vmselect-cluster:8481/select/0/prometheus
    {{- end }}
    isDefault: true
    jsonData:
      timeInterval: "5s"
    {{- if .Values.kcm.kof.acl.enabled }}
      httpMethod: "GET"
      oauthPassThru: true
    {{- end }}
{{- end }}
