kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
    - containerPort: 32000
      hostPort: 32000
    - containerPort: 80
      hostPort: 8080
    - containerPort: 443
      hostPort: 8443
    - containerPort: 32555
      hostPort: 32555
    kubeadmConfigPatches:
      - |
        kind: KubeletConfiguration
        serverTLSBootstrap: true
      - |
        kind: ClusterConfiguration
        controllerManager:
          extraArgs:
            bind-address: 0.0.0.0
      - |
        kind: ClusterConfiguration
        scheduler:
          extraArgs:
            bind-address: 0.0.0.0
      - |
        kind: ClusterConfiguration
        apiServer:
          extraArgs:
            bind-address: 0.0.0.0
      - |
        kind: ClusterConfiguration
        etcd:
          local:
            extraArgs:
              listen-metrics-urls: http://0.0.0.0:2381
      - |
        kind: KubeProxyConfiguration
        metricsBindAddress: 0.0.0.0:10249
    extraMounts: []
