  namespace: kof
  source_chart: kof-mothership
- name: instance:node_cpu_utilisation:rate5m
  group: node-exporter.rules
  expr: 1 - avg without (cpu) ( sum without (mode) (rate(node_cpu_seconds_total{job="node-exporter", mode=~"idle|iowait|steal"}[5m]))
    )
  metrics:
  - node_cpu_seconds_total
