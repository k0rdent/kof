# Dashboard Query Health Policy
#
# This file defines the expected behavior of Grafana dashboard queries
# when probed against a live Prometheus/VictoriaMetrics datasource.
#
# The test validates:
#   1. No unresolved $variables in executed queries
#   2. No unexpected query errors (HTTP or PromQL)
#   3. Required dashboards meet minimum OK query thresholds
#   4. Optional dashboards execute without a data requirement when absent
#   5. Known issues are explicitly tracked with links
#
# Thresholds use min_ok_queries (absolute count) to avoid flakiness from:
#   - Naturally zero error-rate metrics
#   - Metrics with != 0 filters
#   - Dashboard panel additions not breaking existing thresholds

# ---------------------------------------------------------------------------
# Probe configuration
# ---------------------------------------------------------------------------
probe:
  time_range_minutes: 120  # query last 2h for stability
  max_queries_per_dashboard: 0  # unlimited

# ---------------------------------------------------------------------------
# Required dashboards — MUST have data regardless of optional components
# ---------------------------------------------------------------------------
required_dashboards:
  "KPS / Kubernetes / API server":
    min_ok_queries: 5  # 6 with direct metrics; recording rules add more
  "KPS / etcd":
    min_ok_queries: 8
  "KPS / CoreDNS":
    min_ok_queries: 14
  "KPS / Kubernetes / Compute Resources /  Multi-Cluster":
    min_ok_queries: 12  # recording rules (cluster:*) may be empty in kind
  "KPS / Kubernetes / Compute Resources / Cluster":
    min_ok_queries: 10
  "KPS / Kubernetes / Compute Resources / Namespace (Pods)":
    min_ok_queries: 5
  "KPS / Kubernetes / Compute Resources / Node (Pods)":
    min_ok_queries: 2  # 3 from direct metrics; rest needs recording rules
  "KPS / Kubernetes / Compute Resources / Pod":
    min_ok_queries: 8
  "KPS / Kubernetes / Controller Manager":
    min_ok_queries: 3
  "KPS / Kubernetes / Kubelet":
    min_ok_queries: 10
  "KPS / Kubernetes / Networking / Cluster":
    min_ok_queries: 8
  "KPS / Kubernetes / Networking / Namespace (Pods)":
    min_ok_queries: 5
  "KPS / Kubernetes / Networking / Pod":
    min_ok_queries: 5
  "KPS / Kubernetes / Proxy":
    min_ok_queries: 3
  "KPS / Kubernetes / Scheduler":
    min_ok_queries: 2
  "KPS / Node Exporter / USE Method / Cluster":
    min_ok_queries: 1  # 1 from direct metrics (disk IO); rest needs recording rules
  "KPS / Node Exporter / USE Method / Node":
    min_ok_queries: 1  # same as above
  "KPS / Node Exporter / Nodes":
    min_ok_queries: 10
  "Node Exporter Full":
    min_ok_queries: 40
  "Kubernetes / Views / Global":
    min_ok_queries: 5
  "Kubernetes / Views / Namespaces":
    min_ok_queries: 3
  "Kubernetes / Views / Nodes":
    min_ok_queries: 5
  "Kubernetes / Views / Pods":
    min_ok_queries: 3
  "Kubernetes / System / API Server":
    min_ok_queries: 10
  "OpenCost / Cost reporter / Basic overview":
    min_ok_queries: 5
    # These cost-allocation joins are tracked separately: they can return
    # HTTP 400 through the Grafana datasource in upgrade CI while the rest of
    # the OpenCost dashboard is healthy. Keep this scoped to exact panels.
    allowed_errors:
      - panel: "Hour Cost by Namespace"
        message_contains: "HTTP 400"
        expr_contains: "node_ram_hourly_cost"
        reason: "OpenCost cost allocation query is tracked separately"
      - panel: "Hour Cost by Container"
        message_contains: "HTTP 400"
        expr_contains: "node_ram_hourly_cost"
        reason: "OpenCost cost allocation query is tracked separately"
      - panel: "Estimated monthly costs"
        message_contains: "HTTP 400"
        expr_contains: "node_ram_hourly_cost"
        reason: "OpenCost cost allocation query is tracked separately"
      - panel: "Estimated Daily Costs"
        message_contains: "HTTP 400"
        expr_contains: "node_ram_hourly_cost"
        reason: "OpenCost cost allocation query is tracked separately"
      - panel: "Estimated Hourly Costs"
        message_contains: "HTTP 400"
        expr_contains: "node_ram_hourly_cost"
        reason: "OpenCost cost allocation query is tracked separately"
      - panel: "Hour Price by Namespace"
        message_contains: "HTTP 400"
        expr_contains: "node_ram_hourly_cost"
        reason: "OpenCost cost allocation query is tracked separately"
  "VictoriaMetrics - cluster":
    min_ok_queries: 50
  "VictoriaMetrics - operator":
    min_ok_queries: 10

# ---------------------------------------------------------------------------
# Optional dashboards — data is required only when infrastructure is present
# ---------------------------------------------------------------------------
optional_dashboards:
  victoria_traces:
    # Match the dashboard's own $job variable source. If vm_app_version for
    # VictoriaTraces is absent, $job/$instance resolve empty and panels have
    # legitimate no-data.
    detect: metric:vm_app_version{version=~"victoria-traces-.*"}
    dashboards:
      - "VictoriaTraces - cluster"
    when_absent:
      require_no_errors: true
      require_data: false
    when_present:
      min_ok_queries: 20

  victoria_logs:
    # Match the dashboard's own $job variable source. During upgrade this can
    # disappear briefly while VictoriaLogs pods restart.
    detect: metric:vm_app_version{version=~"victoria-logs-.*",cluster="mothership"}
    dashboards:
      - "VictoriaLogs - cluster"
    when_absent:
      require_no_errors: true
      require_data: false
    when_present:
      min_ok_queries: 10

  istio:
    detect: namespace:istio-system
    dashboards:
      - "Istio Control Plane Dashboard":
          min_ok_queries: 3
      - "Istio Mesh Dashboard":
          min_ok_queries: 3
      - "Istio Performance Dashboard":
          min_ok_queries: 1
      - "Istio Service Dashboard":
          # Requires sidecar traffic (istio_requests_total);
          # CI/kind has control plane only, no sidecar-injected workloads.
          allow_no_data: true
      - "Istio Workload Dashboard":
          # Requires sidecar traffic(istio_requests_total)
          allow_no_data: true
    when_absent:
      require_no_errors: true
      require_data: false
    when_present:
      min_ok_queries: 3

  ceph:
    detect: metric:ceph_health_status
    dashboards:
      - "Ceph Cluster"
    when_absent:
      require_no_errors: true
      require_data: false
    when_present:
      min_ok_queries: 5

  gpu:
    detect: metric:DCGM_FI_DEV_GPU_TEMP
    dashboards:
      - "DCGM GPU Monitoring"
    when_absent:
      require_no_errors: true
      require_data: false
    when_present:
      min_ok_queries: 5

  capi_state_metrics:
    detect: metric:capi_cluster_info
    dashboards:
      - "Cluster API State"
    when_absent:
      require_no_errors: true
      require_data: false
    when_present:
      min_ok_queries: 20

  capi_controllers:
    # The Cluster API dashboard selects only core CAPI controller pods.
    detect: metric:workqueue_adds_total{job="kof/control-plane-metrics-monitor",pod=~"capi.*"}
    dashboards:
      - "Cluster API":
          min_ok_queries: 5
    when_absent:
      require_no_errors: true
      require_data: false
    when_present:
      min_ok_queries: 5

  capi_infra_providers:
    # The infra providers dashboard selects non-KCM/non-core-CAPI provider pods.
    detect: metric:workqueue_adds_total{job="kof/control-plane-metrics-monitor",pod!~"kcm.*|capi.*"}
    dashboards:
      - "Cluster API Infratructure Providers":
          min_ok_queries: 5
    when_absent:
      require_no_errors: true
      require_data: false
    when_present:
      min_ok_queries: 5

  flux:
    detect: metric:gotk_reconcile_duration_seconds_sum
    dashboards:
      - "Flux Control Plane"
    when_absent:
      require_no_errors: true
      require_data: false
    when_present:
      min_ok_queries: 8

  sveltos:
    detect: metric:projectsveltos_cluster_connectivity_status
    dashboards:
      - "Sveltos Dashboard"
    when_absent:
      require_no_errors: true
      require_data: false
    when_present:
      min_ok_queries: 5

  grafana_metrics:
    detect: metric:grafana_build_info
    dashboards:
      - "KPS / Grafana Overview"
    when_absent:
      require_no_errors: true
      require_data: false
    when_present:
      min_ok_queries: 3

  prometheus:
    detect: metric:prometheus_build_info
    dashboards:
      - "KPS / Prometheus / Overview"
    when_absent:
      require_no_errors: true
      require_data: false
    when_present:
      min_ok_queries: 5

  # Dashboards that require mothership metrics visible through datasource
  kcm_controller:
    detect: metric:up{job="kcm-controller-manager-metrics-service"}
    dashboards:
      - "KCM Controller Manager"
    when_absent:
      require_no_errors: true
      require_data: false
    when_present:
      min_ok_queries: 5

  k0smotron:
    detect: metric:up{job=~".*k0smotron.*"}
    dashboards:
      - "k0smotron Control Plane"
    when_absent:
      require_no_errors: true
      require_data: false
    when_present:
      min_ok_queries: 5

  macos_nodes:
    detect: metric:node_memory_internal_bytes
    dashboards:
      - "KPS / Node Exporter / MacOS"
    when_absent:
      require_no_errors: true
      require_data: false
    when_present:
      min_ok_queries: 5

  alertmanager:
    detect: metric:alertmanager_alerts
    dashboards:
      - "KPS / Alertmanager / Overview"
    when_absent:
      require_no_errors: true
      require_data: false
    when_present:
      min_ok_queries: 3

  k0rdent_kube_state:
    detect: metric:kube_customresource_clusterdeployment_status_conditions
    dashboards:
      - "k0rdent kube state"
    when_absent:
      require_no_errors: true
      require_data: false
    when_present:
      min_ok_queries: 5

  persistent_volumes:
    detect: metric:kubelet_volume_stats_capacity_bytes
    dashboards:
      - "KPS / Kubernetes / Persistent Volumes"
    when_absent:
      require_no_errors: true
      require_data: false
    when_present:
      min_ok_queries: 3

  networking_workload:
    # Requires recording rule namespace_workload_pod:kube_pod_owner:relabel
    # which aggregates kube_pod_owner by workload type. Without it all 10
    # queries return empty because $workload variable resolves to "".
    detect: metric:namespace_workload_pod:kube_pod_owner:relabel
    dashboards:
      - "KPS / Kubernetes / Networking / Workload"
      - "KPS / Kubernetes / Networking / Namespace (Workload)"
      - "KPS / Kubernetes / Compute Resources / Namespace (Workloads)"
      - "KPS / Kubernetes / Compute Resources / Workload"
    when_absent:
      require_no_errors: true
      require_data: false
    when_present:
      # Promxy can return HTTP 400 for workload recording-rule joins during
      # upgrade/reconnect. Keep this allowance local to workload dashboards and
      # keep validating resolver behavior plus any non-promxy query errors.
      allowed_errors:
        - message_contains: "ReadObject"
          expr_contains: "namespace_workload_pod:kube_pod_owner:relabel"
          reason: "Promxy transient error on workload recording-rule joins"
      allow_no_data: true
      min_ok_queries: 5

# ---------------------------------------------------------------------------
# Known errors — explicitly tracked issues (temporary allowances)
# ---------------------------------------------------------------------------
known_errors: []
# Example:
#   - dashboard: "OpenCost / Cost reporter / Detailed overview"
#     panel: "Relative price now vs (7/14)d ago (Hour Price)"
#     issue: "https://github.com/k0rdent/kof/issues/XXX"
#     reason: "stdvar_over_time requires 7d of data, fails on fresh deploy"
