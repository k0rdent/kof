- name: PrometheusRemoteWriteDesiredShards
  group: prometheus
  expr: ( max_over_time(prometheus_remote_storage_shards_desired{job="kof-mothership-prometheus",namespace="kof"}[5m]) > max_over_time(prometheus_remote_storage_shards_max{job="kof-mothership-prometheus",namespace="kof"}[5m])
    )
  for: 15m
  severity: warning
  metrics:
  - prometheus_remote_storage_shards_desired
  - prometheus_remote_storage_shards_max
  resource: kof-mothership-prometheus
  namespace: kof
  source_chart: kof-mothership
- name: PrometheusRuleFailures
  group: prometheus
  expr: increase(prometheus_rule_evaluation_failures_total{job="kof-mothership-prometheus",namespace="kof"}[5m]) > 0
  for: 15m
  severity: critical
  metrics:
  - prometheus_rule_evaluation_failures_total
  resource: kof-mothership-prometheus
  namespace: kof
  source_chart: kof-mothership
- name: PrometheusMissingRuleEvaluations
  group: prometheus
  expr: increase(prometheus_rule_group_iterations_missed_total{job="kof-mothership-prometheus",namespace="kof"}[5m]) > 0
  for: 15m
  severity: warning
  metrics:
  - prometheus_rule_group_iterations_missed_total
  resource: kof-mothership-prometheus
  namespace: kof
  source_chart: kof-mothership
- name: PrometheusTargetLimitHit
  group: prometheus
  expr: increase(prometheus_target_scrape_pool_exceeded_target_limit_total{job="kof-mothership-prometheus",namespace="kof"}[5m])
    > 0
  for: 15m
  severity: warning
  metrics:
  - prometheus_target_scrape_pool_exceeded_target_limit_total
  resource: kof-mothership-prometheus
  namespace: kof
  source_chart: kof-mothership
- name: PrometheusLabelLimitHit
  group: prometheus
  expr: increase(prometheus_target_scrape_pool_exceeded_label_limits_total{job="kof-mothership-prometheus",namespace="kof"}[5m])
    > 0
  for: 15m
  severity: warning
  metrics:
  - prometheus_target_scrape_pool_exceeded_label_limits_total
  resource: kof-mothership-prometheus
  namespace: kof
  source_chart: kof-mothership
- name: PrometheusScrapeBodySizeLimitHit
  group: prometheus
  expr: increase(prometheus_target_scrapes_exceeded_body_size_limit_total{job="kof-mothership-prometheus",namespace="kof"}[5m])
    > 0
  for: 15m
  severity: warning
  metrics:
  - prometheus_target_scrapes_exceeded_body_size_limit_total
  resource: kof-mothership-prometheus
  namespace: kof
  source_chart: kof-mothership
- name: PrometheusScrapeSampleLimitHit
  group: prometheus
  expr: increase(prometheus_target_scrapes_exceeded_sample_limit_total{job="kof-mothership-prometheus",namespace="kof"}[5m])
    > 0
  for: 15m
  severity: warning
  metrics:
  - prometheus_target_scrapes_exceeded_sample_limit_total
  resource: kof-mothership-prometheus
  namespace: kof
  source_chart: kof-mothership
- name: PrometheusTargetSyncFailure
  group: prometheus
  expr: increase(prometheus_target_sync_failed_total{job="kof-mothership-prometheus",namespace="kof"}[30m]) > 0
  for: 5m
  severity: critical
  metrics:
  - prometheus_target_sync_failed_total
  resource: kof-mothership-prometheus
  namespace: kof
  source_chart: kof-mothership
- name: PrometheusHighQueryLoad
  group: prometheus
  expr: avg_over_time(prometheus_engine_queries{job="kof-mothership-prometheus",namespace="kof"}[5m]) / max_over_time(prometheus_engine_queries_concurrent_max{job="kof-mothership-prometheus",namespace="kof"}[5m])
    > 0.8
  for: 15m
  severity: warning
  metrics:
  - prometheus_engine_queries
  - prometheus_engine_queries_concurrent_max
  resource: kof-mothership-prometheus
  namespace: kof
  source_chart: kof-mothership
- name: PrometheusErrorSendingAlertsToAnyAlertmanager
  group: prometheus
  expr: min without (alertmanager) ( rate(prometheus_notifications_errors_total{job="kof-mothership-prometheus",namespace="kof",alertmanager!~``}[5m])
    / rate(prometheus_notifications_sent_total{job="kof-mothership-prometheus",namespace="kof",alertmanager!~``}[5m]) ) *
    100 > 3
  for: 15m
  severity: critical
  metrics:
  - alertmanager
  - prometheus_notifications_errors_total
  - prometheus_notifications_sent_total
  resource: kof-mothership-prometheus
  namespace: kof
  source_chart: kof-mothership
