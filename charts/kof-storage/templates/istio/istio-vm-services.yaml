{{- if .Values.victoriametrics.enabled }}
{{- if .Values.victoriametrics.vmcluster.enabled }}
{{- if .Values.istio_endpoints }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.global.cluster }}-logs-insert
  namespace: {{ .Release.Namespace }}
spec:
  ports:
  - name: http
    port: 9481
    protocol: TCP
    targetPort: http
  selector:
    app: vlinsert
    app.kubernetes.io/instance: kof-storage
    app.kubernetes.io/name: victoria-logs-cluster
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.global.cluster }}-logs-select
  namespace: {{ .Release.Namespace }}
spec:
  ports:
  - name: http
    port: 9471
    protocol: TCP
    targetPort: http
  selector:
    app: vlselect
    app.kubernetes.io/instance: kof-storage
    app.kubernetes.io/name: victoria-logs-cluster
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.global.cluster }}-vminsert
  namespace: {{ .Release.Namespace }}
spec:
  ports:
  - name: http
    port: 8480
    protocol: TCP
    targetPort: 8480
  selector:
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/instance: cluster
    app.kubernetes.io/name: vminsert
    managed-by: vm-operator
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.global.cluster }}-vmselect
  namespace: {{ .Release.Namespace }}
spec:
  ports:
  - name: http
    port: 8481
    protocol: TCP
    targetPort: 8481
  selector:
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/instance: cluster
    app.kubernetes.io/name: vmselect
    managed-by: vm-operator
  type: ClusterIP
{{- end }}
{{- end }}
{{- end }}
