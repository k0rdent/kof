{{- if and .Values.dex.enabled (index .Values "dex" "httpRoute" "enabled") }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-dex
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Release.Namespace }}
  hostnames:
    - {{ index .Values "dex" "httpRoute" "hostname" | quote }}
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: {{ .Release.Name }}-dex
          port: 5556
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
{{- end }}
