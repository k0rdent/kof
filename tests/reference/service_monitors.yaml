# This is a STATIC reference dataset describing what SHOULD exist after
# a KOF installation. It does NOT prove that runtime data is flowing.
# Use live validation tests to verify actual observability pipeline health.
---
total_monitors: 24
service_monitors:
- kind: ServiceMonitor
  name: kof-mothership-sveltos-sc-manager
  namespace: kof
  source_chart: kof-mothership
  selector_labels:
    control-plane: sc-manager
  namespace_selector:
    matchNames:
    - projectsveltos
  endpoints:
  - port: metrics
    path: /metrics
    interval: ''
    scheme: https
- kind: ServiceMonitor
  name: kof-mothership-sveltos-addon-controller
  namespace: kof
  source_chart: kof-mothership
  selector_labels:
    control-plane: addon-controller
