  source_chart: kof-mothership
  selector_labels:
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/instance: cluster
    app.kubernetes.io/name: vmalertmanager
    managed-by: vm-operator
  namespace_selector: {}
  endpoints:
  - port: http
    path: /metrics
    interval: ''
    scheme: http
- kind: ServiceMonitor
