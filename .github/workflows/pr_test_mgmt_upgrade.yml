name: Test Management Upgrade

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
      - release/*
    paths:
      - "charts/**"
      - "!**.md"
      - ".github/workflows/pr_test_mgmt_upgrade.yml"

jobs:
  deploy:
    name: Upgrade KOF
    runs-on: ${{ github.repository_owner == 'k0rdent' && 'kof' || 'ubuntu-latest' }}
    steps:
      - name: "[PR] Checkout"
        uses: actions/checkout@v6
      - name: "[PR] Shared setup"
        uses: ./.github/actions/shared-setup
      - id: kof_release
        uses: pozetroninc/github-action-get-latest-release@master
        with:
          owner: k0rdent
          repo: kof
          excludes: prerelease, draft
      - id: kcm_release
        uses: pozetroninc/github-action-get-latest-release@master
        with:
          owner: k0rdent
          repo: kcm
          excludes: prerelease, draft
      - name: "[Latest Release] Checkout"
        uses: actions/checkout@v6
        with:
          repository: k0rdent/kof
          ref: ${{ steps.kof_release.outputs.release }}
          fetch-depth: 0
      - name: Patch Kind Config
        if: github.repository_owner == 'k0rdent'
        uses: ./.github/actions/kind-config-patch
        with:
          registry-username: ${{ secrets.REGISTRY_CI_USERNAME }}
          registry-password: ${{ secrets.REGISTRY_CI_PASSWORD }}
      - name: "[Latest Release] Install KOF CLI"
        run: |
          make cli-install
      - name: "[Latest KCM Release] Create KIND cluster"
        run: |
          make dev kind-deploy KIND_CONFIG_PATH="$PWD/config/kind.yaml"
      - name: "[Latest KCM Release] Start local registry"
        run: |
          make registry-deploy
      - name: "[Latest KCM Release] Install Envoy Gateway"
        run: |
          helm upgrade --install envoy-gateway oci://docker.io/envoyproxy/gateway-helm \
            --version v1.7.2 \
            -n envoy-gateway-system \
            --create-namespace \
            --wait \
            --timeout 10m
      - name: "[Latest KCM Release] Install KCM from release chart"
        run: |
          KCM_TAG="${{ steps.kcm_release.outputs.release }}"
          helm install kcm oci://ghcr.io/k0rdent/kcm/charts/kcm \
            --version "${KCM_TAG#v}" \
            --set regional.cert-manager.config.enableGatewayAPI=true \
            -n kcm-system \
            --create-namespace \
            --wait \
            --timeout 10m
      - name: "[Latest KCM Release] Wait for mgmt/kcm"
        run: |
          kubectl wait --for create mgmt/kcm --timeout=1m
          kubectl patch mgmt/kcm --type='json' -p '[{"op": "replace", "path": "/spec/providers", "value":[{"name":"projectsveltos"}]}]'
          kubectl wait --for=condition=Ready mgmt/kcm --timeout=10m
      - name: Run KIND cloud provider
        run: docker run -d --rm --network kind -v /var/run/docker.sock:/var/run/docker.sock registry.k8s.io/cloud-provider-kind/cloud-controller-manager:v0.10.0
      - name: "[Latest KOF Release] Install KOF from release chart"
        run: |
          KOF_TAG="${{ steps.kof_release.outputs.release }}"
          helm install kof oci://ghcr.io/k0rdent/kof/charts/kof \
            --version "${KOF_TAG#v}" \
            -n kof \
            --create-namespace \
            --timeout 10m
          kubectl wait --for=condition=Ready helmreleases --all -n kof --timeout=10m
      - name: Fetch PR Ref and Checkout Repo
        uses: ./.github/actions/fetch-pr-ref
      - name: "[Main KCM Branch] Get latest successful KCM CI SHA"
        id: main-kcm-ci
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA=$(gh run list --repo k0rdent/kcm --workflow build-staging.yaml \
            --branch "$KCM_RELEASE" --status success --limit 1 \
            --json headSha --jq '.[0].headSha // empty')
          [ -n "$SHA" ] || { echo "::error::No successful KCM CI runs for $KCM_RELEASE"; exit 1; }
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
      - name: "[Main Branch] Checkout KCM repository"
        uses: actions/checkout@v6
        with:
          repository: k0rdent/kcm
          ref: ${{ steps.main-kcm-ci.outputs.sha }}
          path: kcm-repo
          fetch-depth: 0
      - name: "[Main KCM Branch] Get CI chart version"
        id: main-kcm-chart-version
        run: |
          KCM_VERSION="$(git -C kcm-repo describe --tags --always)"
          KCM_VERSION="${KCM_VERSION#v}"
          echo "version=$KCM_VERSION" >> "$GITHUB_OUTPUT"
      - name: Upgrade KCM
        run: |
          KCM_VERSION="${{ steps.main-kcm-chart-version.outputs.version }}"
          KCM_RELEASE="kcm-${KCM_VERSION//./-}"

          kubectl apply -f "https://raw.githubusercontent.com/k0rdent/kcm/refs/tags/v${KCM_VERSION}/templates/provider/kcm-templates/files/release.yaml"

          kubectl wait --for=create "release/$KCM_RELEASE" --timeout=5m
          kubectl wait "release/$KCM_RELEASE" \
            --for='jsonpath={.status.ready}=true' \
            --timeout=10m

          kubectl patch mgmt/kcm --type=merge \
            -p "{\"spec\":{\"release\":\"$KCM_RELEASE\",\"providers\":[{\"name\":\"projectsveltos\"}]}}"
          kubectl wait mgmt/kcm \
            --for="jsonpath={.status.release}=$KCM_RELEASE" \
            --timeout=10m
          kubectl wait --for=condition=Ready mgmt/kcm --timeout=10m
      - name: Install KOF CLI
        run: |
          make cli-install
      - name: Push KOF Helm Charts
        run: |
          make helm-push
      - name: "[Main Branch] Setup Go"
        uses: actions/setup-go@v6
        with:
          go-version-file: kof-operator/go.mod
          cache: false
      - name: Deploy KOF Components on Mothership cluster
        run: |
          make dev-deploy
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install -r scripts/requirements.txt
      - name: "[PR] Grafana gateway smoke test"
        run: |
          make dev-grafana-smoke
      - name: Make support-bundle
        if: ${{ failure() }}
        run: |
          make support-bundle
      - name: Archive support-bundle
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: support-bundle.tar.gz
          path: ./support-bundle-*.tar.gz
