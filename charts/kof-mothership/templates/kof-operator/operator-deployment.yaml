{{- $global := .Values.global | default dict }}
{{- if .Values.kcm.kof.operator.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "operator.fullname" . }}-kof-operator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "operator.labels" . | nindent 4 }}
    {{- if .Values.kcm.kof.operator.extraLabels}}
    {{ toYaml .Values.kcm.kof.operator.extraLabels | nindent 4 }}
    {{- end}}
  {{- with .Values.kcm.kof.operator.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.kcm.kof.operator.replicaCount }}
  {{- if (.Values.kcm.kof.operator.deployment | default dict).strategy }}
  strategy:
    {{- toYaml .Values.kcm.kof.operator.deployment.strategy | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "operator.selectorLabels" . | nindent 8 }}
        {{- if .Values.kcm.kof.operator.extraLabels}}
        {{ toYaml .Values.kcm.kof.operator.extraLabels | nindent 8 }}
        {{- end}}
    spec:
    {{- with .Values.kcm.kof.operator.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
    {{- end }}
      serviceAccountName: {{ include "operator.serviceAccountName" . }}
    {{- if .Values.kcm.kof.operator.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.kcm.kof.operator.nodeSelector | nindent 8 }}
    {{- end }}
    {{- with .Values.kcm.kof.operator.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- if .Values.kcm.kof.operator.affinity }}
      affinity:
        {{- toYaml .Values.kcm.kof.operator.affinity | nindent 8 }}
    {{- end }}
      containers:
      - name: operator
        command:
        - "/manager"
        args:
        - "--http-server-port={{ .Values.kcm.kof.operator.ui.port }}"
        - "--management-cluster-name={{ .Values.global.clusterName }}"
        env:
          - name: "KOF_GRAFANA_ENABLED"
            value: "{{ .Values.grafana.enabled }}"
          - name: "KOF_REGIONLESS_ENABLED"
            value: "{{ .Values.regionless.enabled }}"
          - name: "KOF_REGIONLESS_DOMAIN"
            value: "{{ .Values.regionless.domain }}"
          - name: "CROSS_NAMESPACE"
            value: "{{ .Values.kcm.kof.operator.crossNamespace }}"
          - name: "PROMXY_RELOAD_ENDPOINT"
            value: "http://{{ .Release.Name }}-promxy:{{ .Values.promxy.service.servicePort }}/-/reload"
          - name: "RELEASE_NAMESPACE"
            value: {{ .Release.Namespace }}
          - name: "RELEASE_NAME"
            value: {{ .Release.Name }}
          - name: "KOF_PROPAGATION_TEMPLATE"
            value: "kof-propagation-{{ $.Chart.Version | replace "." "-" }}"
          - name: "KOF_VT_CLUSTER_NAME"
            value: {{ .Release.Name }}-multilevel-select
          - name: "KOF_VL_CLUSTER_NAME"
            value: {{ .Release.Name }}-logs-multilevel-select
          {{- if .Values.kcm.kof.operator.otlp.enabled }}
          - name: "OTEL_SERVICE_NAME"
            value: "kof-operator"
          - name: "OTEL_RESOURCE_ATTRIBUTES"
            value: "k8s.namespace.name={{ .Release.Namespace }}"
          {{- $ns := lookup "v1" "Namespace" "" .Release.Namespace }}
          {{- if $ns | dig "metadata" "labels" "istio-injection" "" | eq "enabled" }}
          - name: "OTEL_EXPORTER_OTLP_ENDPOINT"
            value: {{ .Values.kcm.kof.operator.otlp.endpoint | default "http://kof-collectors-daemon-collector:4317" | quote }}
          {{- else }}
          - name: "NODE_IP"
            valueFrom:
              fieldRef:
                fieldPath: status.hostIP
          - name: "OTEL_EXPORTER_OTLP_ENDPOINT"
            value: "http://$(NODE_IP):4317"
          {{- end }}
          - name: "OTEL_EXPORTER_OTLP_PROTOCOL"
            value: "grpc"
          {{- end }}
        image: "
          {{- with $global.registry }}{{ . }}
          {{- else }}{{ .Values.kcm.kof.operator.image.registry }}
          {{- end }}/{{ .Values.kcm.kof.operator.image.repository }}:
          {{- with .Values.kcm.kof.operator.image.tag }}{{ . }}
          {{- else }}v{{ .Chart.AppVersion | trimPrefix "v" }}{{ end }}"
        imagePullPolicy: {{ .Values.kcm.kof.operator.image.pullPolicy }}
        livenessProbe:
          failureThreshold: 6
          httpGet:
            path: /healthz
            port: http
            scheme: HTTP
          periodSeconds: 5
          successThreshold: 1
          timeoutSeconds: 3
        readinessProbe:
          failureThreshold: 120
          httpGet:
            path: /readyz
            port: http
            scheme: HTTP
          periodSeconds: 5
          successThreshold: 1
          timeoutSeconds: 3
        ports:
        - containerPort: 8081
          name: http
        - containerPort: {{ .Values.kcm.kof.operator.ui.port }}
          name: ui
        resources:
          {{- toYaml .Values.kcm.kof.operator.resources | nindent 12 }}
{{- end }}
