name: Test Adopted Clusters Upgrade

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
      - release/*
    paths:
      - "charts/**"
      - "kof-operator/**"
      - "!**.md"
      - ".github/workflows/pr_test_adopted_upgrade.yml"
jobs:
  latest_releases:
    strategy:
      fail-fast: false
      matrix:
        target: ["kcm", "kof", "istio"]
    name: Get Latest Release
    runs-on: ${{ github.repository_owner == 'k0rdent' && 'kof' || 'ubuntu-latest' }}
    steps:
      - id: release
        uses: pozetroninc/github-action-get-latest-release@master
        with:
          owner: k0rdent
          repo: ${{ matrix.target }}
          excludes: prerelease, draft
      - name: output
        id: output
        run: |
          echo "${{ matrix.target }}=${{ steps.release.outputs.release }}" >> $GITHUB_OUTPUT
    outputs:
      kcm: ${{ steps.output.outputs.kcm }}
      kof: ${{ steps.output.outputs.kof }}
      istio: ${{ steps.output.outputs.istio }}
  deploy:
    defaults:
      run:
        shell: bash --noprofile --norc -euo pipefail {0}
    needs: latest_releases
    strategy:
      fail-fast: false
      matrix:
        target: ["dev", "dev-istio"]
    name: Upgrade KOF
    runs-on: ${{ github.repository_owner == 'k0rdent' && 'kof' || 'ubuntu-latest' }}
    steps:
      - name: "[PR] Checkout"
        uses: actions/checkout@v6
      - name: "[PR] Shared setup"
        uses: ./.github/actions/shared-setup
      - name: "[Latest KOF Release] Checkout"
        uses: actions/checkout@v6
        with:
          repository: k0rdent/kof
          ref: ${{ needs.latest_releases.outputs.kof }}
          fetch-depth: 0
      - name: "[Latest Istio Release] Checkout"
        if: ${{ matrix.target == 'dev-istio' }}
        uses: actions/checkout@v6
        with:
          repository: k0rdent/istio
          ref: ${{ needs.latest_releases.outputs.istio }}
          path: istio-repo
          fetch-depth: 0
      - name: Patch Kind Config
        if: github.repository_owner == 'k0rdent'
        uses: ./.github/actions/kind-config-patch
        with:
          registry-username: ${{ secrets.REGISTRY_CI_USERNAME }}
          registry-password: ${{ secrets.REGISTRY_CI_PASSWORD }}
      - name: "[Latest Release] Install KOF CLI"
        run: |
          make cli-install
      - name: "[Latest KCM Release] Create KIND cluster"
        run: |
          make dev kind-deploy KIND_CONFIG_PATH="$PWD/config/kind.yaml"
      - name: "[Latest KCM Release] Start local registry"
        run: |
          make registry-deploy
      - name: "[Latest KCM Release] Get chart version"
        id: kcm_chart_version
        run: |
          KCM_TAG="${{ needs.latest_releases.outputs.kcm }}"
          echo "version=${KCM_TAG#v}" >> $GITHUB_OUTPUT
      - name: "[Latest KCM Release] Install KCM from release chart"
        run: |
          helm install kcm oci://ghcr.io/k0rdent/kcm/charts/kcm \
            --version ${{ steps.kcm_chart_version.outputs.version }} \
            --set regional.cert-manager.config.enableGatewayAPI=true \
            -n kcm-system \
            --create-namespace \
            --wait \
            --timeout 10m
      - name: "[Latest KCM Release] Wait for mgmt/kcm"
        run: |
          kubectl wait --for create mgmt/kcm --timeout=1m
          kubectl patch mgmt/kcm --type='json' -p '[{"op": "replace", "path": "/spec/providers", "value":[{"name":"projectsveltos"}]}]'
          kubectl wait --for=condition=Ready mgmt/kcm --timeout=10m
      - name: Install Envoy Gateway
        run: |
          helm upgrade --install envoy-gateway oci://docker.io/envoyproxy/gateway-helm \
            --version v1.7.2 \
            -n envoy-gateway-system \
            --create-namespace \
            --wait \
            --timeout 10m
      - name: "[Latest KOF Release] Push Helm Charts"
        run: |
          make helm-push
      - name: "[Latest Istio Release] Go version"
        if: ${{ matrix.target == 'dev-istio' }}
        id: latest-istio-go-version
        uses: arnested/go-version-action@v2
        with:
          working-directory: istio-repo/istio-operator
      - name: "[Latest Istio Release] Setup Go"
        if: ${{ matrix.target == 'dev-istio' }}
        uses: actions/setup-go@v6
        with:
          go-version-file: istio-repo/istio-operator/go.mod
          cache: false
      - name: "[Latest Istio Release] Install Istio"
        if: ${{ matrix.target == 'dev-istio' }}
        run: |
          kubectl wait --for create crd/clusterprofiles.config.projectsveltos.io --timeout=5m
          kubectl create namespace kof
          kubectl label namespace kof istio-injection=enabled
          make -C istio-repo cli-install helm-push dev-istio-deploy
      - name: "[Latest KOF Release] Go version"
        id: latest-kof-go-version
        uses: arnested/go-version-action@v2
        with:
          working-directory: kof-operator
      - name: "[Latest KOF Release] Setup Go"
        uses: actions/setup-go@v6
        with:
          go-version-file: kof-operator/go.mod
          cache: false
      - name: "[Latest KOF Release] Patch values for release-chart KCM"
        run: |
          sed -i 's/name: kcm-templates/name: kof-local-registry/' charts/kof/values-local.yaml
          sed -i '/kofManaged:/{n;s/enabled: false/enabled: true/}' charts/kof/values-local.yaml
      - name: "[Latest KOF Release] Deploy KOF Components"
        run: |
          DISABLE_KOF_COLLECTORS=true DISABLE_KOF_STORAGE=true make dev-deploy
      - name: "[Latest KOF Release] Cleanup kind clusters if any"
        run: |
          make dev-adopted-rm KIND_CLUSTER_NAME=child-adopted
          make dev-adopted-rm KIND_CLUSTER_NAME=regional-adopted

      - name: "[Latest KOF Release] Run KIND kof Regional cluster"
        run: |
          make dev-adopted-deploy KIND_CLUSTER_NAME=regional-adopted KIND_CONFIG_PATH=$PWD/config/kind.yaml
      - name: Run KIND cloud provider
        run: docker run -d --rm --network kind -v /var/run/docker.sock:/var/run/docker.sock registry.k8s.io/cloud-provider-kind/cloud-controller-manager:v0.10.0
      - name: "[Latest KOF Release] Deploy KOF components on adopted Regional cluster"
        run: |
          make ${{ matrix.target }}-regional-deploy-adopted

      - name: "[Latest KOF Release] Run KIND KOF Child cluster"
        run: |
          make dev-adopted-deploy KIND_CLUSTER_NAME=child-adopted KIND_CONFIG_PATH=$PWD/config/kind.yaml
      - name: "[Latest KOF Release] Configure CoreDNS hosts on Child cluster"
        if: ${{ matrix.target == 'dev' }}
        run: |
          make dev-coredns
      - name: "[Latest KOF Release] Deploy KOF components on adopted Child cluster"
        run: |
          make ${{ matrix.target }}-child-deploy-adopted

      - name: Fetch PR Ref and Checkout Repo
        uses: ./.github/actions/fetch-pr-ref
      - name: "[Main KCM Branch] Checkout KCM repository"
        uses: actions/checkout@v6
        with:
          repository: k0rdent/kcm
          ref: ${{ env.KCM_RELEASE }}
          path: kcm-repo
          fetch-depth: 0
      - name: "[Main KCM Branch] Go version"
        id: main-kcm-go-version
        uses: arnested/go-version-action@v2
        with:
          working-directory: kcm-repo
      - name: "[Main KCM Branch] Setup Go"
        if: ${{ steps.latest-kof-go-version.outputs.go-mod-version != steps.main-kcm-go-version.outputs.go-mod-version }}
        uses: actions/setup-go@v6
        with:
          go-version-file: kcm-repo/go.mod
          cache: false
      - name: "[Main KCM Branch] Point KCM to local registry for templates"
        run: |
          kubectl patch management kcm --type=merge \
            -p '{"spec":{"core":{"kcm":{"config":{"controller":{"templatesRepoURL":"oci://kcm-local-registry:5000/charts","insecureRegistry":true}}}}}}'
          # Also patch HelmRepository directly as belt-and-suspenders
          kubectl patch helmrepository kcm-templates -n kcm-system --type=merge \
            -p '{"spec":{"url":"oci://kcm-local-registry:5000/charts","type":"oci","insecure":true}}'
          # Wait for reconciliation and verify
          sleep 10
          echo "kcm-templates URL: $(kubectl get helmrepository kcm-templates -n kcm-system -o jsonpath='{.spec.url}')"
      - name: "[Main KCM Branch] Set chart versions to match git describe"
        run: |
          make -C kcm-repo set-kcm-version
      - name: "[Main KCM Branch] Upgrade KCM"
        run: |
          KIND_VERSION=v0.29.0 make kcm-dev-upgrade KCM_REPO_PATH="kcm-repo"
          kubectl patch mgmt/kcm --type='json' -p '[{"op": "replace", "path": "/spec/providers", "value":[{"name":"projectsveltos"}]}]'

      # NOTE: This step is not needed while we have the same "adopted-cluster-1-0-2"
      # both in [Latest KCM Release] and [Main KCM Branch] but we may need it later:
      #
      # - name: Create ClusterTemplateChains for adopted-cluster template
      #   run: |
      #     kubectl apply -f - <<EOF
      #     apiVersion: k0rdent.mirantis.com/v1beta1
      #     kind: ClusterTemplateChain
      #     metadata:
      #       name: adopted-cluster-chain
      #       namespace: kcm-system
      #     spec:
      #       supportedTemplates:
      #       - name: adopted-cluster-1-0-1
      #         availableUpgrades:
      #         - name: adopted-cluster-1-0-2
      #           version: 1.0.2
      #       - name: adopted-cluster-1-0-2
      #     EOF

      - name: Patch AccessManagement to allow cluster upgrade
        run: |
          kubectl get accessmanagement kcm -o json \
            | jq '.spec.accessRules += [{"clusterTemplateChains":["adopted-cluster-chain"],"targetNamespaces":{"list":["kcm-system"]}}]' \
            | kubectl apply -f -
      - name: "[PR] Install KOF CLI"
        run: |
          make cli-install
      - name: "[PR] Push KOF Helm Charts"
        run: |
          make helm-push
      - name: "[Main Istio Branch] Checkout"
        if: ${{ matrix.target == 'dev-istio' }}
        uses: actions/checkout@v6
        with:
          repository: k0rdent/istio
          ref: main
          path: istio-repo
          fetch-depth: 0
      - name: "[Main Istio Branch] Go version"
        if: ${{ matrix.target == 'dev-istio' }}
        id: main-istio-go-version
        uses: arnested/go-version-action@v2
        with:
          working-directory: istio-repo/istio-operator
      - name: "[Main Istio Branch] Setup Go"
        if: ${{ matrix.target == 'dev-istio' && steps.main-istio-go-version.outputs.go-mod-version != steps.main-kcm-go-version.outputs.go-mod-version }}
        uses: actions/setup-go@v6
        with:
          go-version-file: istio-repo/istio-operator/go.mod
          cache: false
      - name: "[Main Istio Branch] Install Istio"
        if: ${{ matrix.target == 'dev-istio' }}
        run: |
          make -C istio-repo cli-install helm-push dev-istio-deploy
      - name: "[Main Branch] KOF Go version"
        id: main-kof-go-version
        uses: arnested/go-version-action@v2
        with:
          working-directory: kof-operator
      - name: "[Main Branch] Setup Go"
        if: ${{ steps.main-kcm-go-version.outputs.go-mod-version != steps.main-kof-go-version.outputs.go-mod-version }}
        uses: actions/setup-go@v6
        with:
          go-version-file: kof-operator/go.mod
          cache: false
      - name: "[PR] Deploy KOF components on Mothership cluster"
        run: |
          DISABLE_KOF_COLLECTORS=true DISABLE_KOF_STORAGE=true make dev-deploy
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install -r scripts/requirements.txt
      - name: "[PR] Grafana gateway smoke test"
        run: |
          make dev-grafana-smoke
      - name: "[PR] Run KIND kof Regional cluster"
        run: |
          make dev-adopted-deploy KIND_CLUSTER_NAME=regional-adopted KIND_CONFIG_PATH=$PWD/config/kind.yaml
      - name: "[PR] Run KIND kof Child cluster"
        run: |
          make dev-adopted-deploy KIND_CLUSTER_NAME=child-adopted KIND_CONFIG_PATH=$PWD/config/kind.yaml

      - name: "[PR] Deploy KOF components on adopted Regional cluster"
        run: |
          make ${{ matrix.target }}-regional-deploy-adopted
      - name: "[PR] Deploy KOF components on adopted Child cluster"
        run: |
          make ${{ matrix.target }}-child-deploy-adopted
      - name: "[PR] Configure CoreDNS hosts on Child cluster"
        if: ${{ matrix.target == 'dev' }}
        run: |
          make dev-coredns
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install -r scripts/requirements.txt
      - name: Waiting 10m for metrics collection
        run: sleep 10m
      - run: make dev-grafana-port-forward
      - name: Checking all collectors are up and running
        run: |
          KUBECTL_CONTEXT=kind-regional-adopted make wait-otel-collectors
          KUBECTL_CONTEXT=kind-child-adopted make wait-otel-collectors
      - name: Checking metrics
        run: python -m pytest scripts/metrics_smoke_test.py -v
      # TODO: Enable audit logs check once the upgrade workflow deploys clusters with audit logs enabled
      # - name: Checking audit logs
      #   run: python -m pytest scripts/audit_logs_smoke_test.py -v
      - name: Make support-bundle
        if: ${{ failure() }}
        run: |
          make support-bundle
          make support-bundle KUBECTL_CONTEXT=kind-regional-adopted
          make support-bundle KUBECTL_CONTEXT=kind-child-adopted
      - name: Archive support-bundle
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}-support-bundles.tar.gz
          path: ./support-bundle-*.tar.gz
